<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>AuraMarket | Админ-панель</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: radial-gradient(circle at 20% 30%, #0a0a0f, #030308);
            font-family: 'Montserrat', system-ui;
            color: white;
            min-height: 100vh;
            padding-bottom: 20px;
        }
        .glass-card {
            background: rgba(20,20,40,0.65);
            backdrop-filter: blur(16px);
            border-radius: 32px;
            padding: 20px;
            margin: 16px;
            border: 1px solid rgba(179,0,255,0.35);
        }
        .btn-primary {
            background: linear-gradient(90deg, #b300ff, #6a00ff);
            border: none;
            width: 100%;
            padding: 14px;
            border-radius: 60px;
            font-weight: bold;
            color: white;
            cursor: pointer;
            margin: 5px 0;
        }
        .btn-danger {
            background: linear-gradient(90deg, #ff3b3b, #cc0000);
        }
        .btn-secondary {
            background: #2a2a3a;
        }
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 16px;
            padding: 10px;
        }
        .product-card {
            background: rgba(25,25,50,0.7);
            border-radius: 28px;
            padding: 16px;
            border: 1px solid rgba(179,0,255,0.25);
        }
        .stat-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid rgba(179,0,255,0.2); }
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(8,8,16,0.96);
            backdrop-filter: blur(20px);
            display: flex;
            justify-content: space-around;
            padding: 8px 16px 22px;
            border-top: 1px solid #b300ff;
        }
        .nav-item {
            background: transparent;
            border: none;
            color: #aaa;
            font-size: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            cursor: pointer;
            padding: 6px 12px;
            border-radius: 40px;
        }
        .nav-item.active { color: #b300ff; background: rgba(179,0,255,0.15); }
        .logo-3d {
            width: 70px; height: 70px;
            background: linear-gradient(135deg, #1e0b32, #0a0a0f);
            border-radius: 28px;
            margin: 0 auto 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
        }
        .logo-letter { font-size: 42px; font-weight: 900; background: linear-gradient(145deg, #fff, #b300ff); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .category-chip {
            background: rgba(179,0,255,0.2);
            border-radius: 30px;
            padding: 6px 16px;
            font-size: 14px;
            cursor: pointer;
            display: inline-block;
            margin: 5px;
        }
        .category-chip.active { background: #b300ff; color: white; }
        .categories { text-align: center; margin: 10px 0; }
        .admin-badge {
            background: #b300ff;
            color: white;
            padding: 8px;
            border-radius: 20px;
            text-align: center;
            font-weight: bold;
            margin-bottom: 10px;
        }
        input, textarea {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            background: #1a1a2e;
            border: 1px solid #b300ff;
            border-radius: 16px;
            color: white;
            font-size: 16px;
        }
    </style>
</head>
<body>

<div class="glass-card" style="text-align:center">
    <div class="logo-3d"><span class="logo-letter">A</span><span class="logo-letter">M</span></div>
    <div style="font-size:26px; font-weight:800;">AuraMarket</div>
    <div style="font-size:12px; color:#b300ff;">Премиум магазин + Админ-панель</div>
</div>

<div id="content"></div>
<div class="bottom-nav">
    <button class="nav-item" data-tab="catalog"><span>🛍️</span><span>Каталог</span></button>
    <button class="nav-item" data-tab="profile"><span>👤</span><span>Профиль</span></button>
    <button class="nav-item" data-tab="balance"><span>💵</span><span>Баланс</span></button>
    <button class="nav-item" data-tab="cart"><span>🛒</span><span>Корзина</span></button>
    <button class="nav-item" data-tab="faq"><span>❓</span><span>FAQ</span></button>
    <button class="nav-item" data-tab="admin"><span>🔐</span><span>Админ</span></button>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();
    const user = tg.initDataUnsafe?.user || { id: 0, username: 'user', first_name: 'Гость' };
    const ADMIN_ID = 912559442;
    let isAdmin = (user.id === ADMIN_ID);
    
    let balance = 0, totalOrders = 0, pendingOrders = 0;
    let cart = [];
    let allProducts = [];
    let currentCategory = 'all';
    let categories = new Set();
    let currentTab = 'catalog';
    
    async function sendRequest(action, data = {}) {
        data.action = action;
        const response = await tg.sendData(JSON.stringify(data));
        try { 
            return JSON.parse(response); 
        } catch(e) { 
            console.log("Ошибка парсинга:", e);
            return {}; 
        }
    }
    
    async function loadData() {
        try {
            let data = await sendRequest('get_data');
            balance = data.balance || 0;
            totalOrders = data.total_orders || 0;
            pendingOrders = data.pending_orders || 0;
            let prodData = await sendRequest('get_products');
            allProducts = prodData.products || [];
            categories.clear();
            categories.add('all');
            allProducts.forEach(p => categories.add(p.category));
            renderCurrentTab();
            console.log("Загружено товаров:", allProducts.length);
        } catch(e) {
            console.log("Ошибка загрузки:", e);
        }
    }
    
    function renderCatalog() {
        let filtered = currentCategory === 'all' ? allProducts : allProducts.filter(p => p.category === currentCategory);
        let chips = Array.from(categories).map(cat => `<span class="category-chip ${cat === currentCategory ? 'active' : ''}" data-cat="${cat}">${cat === 'all' ? 'Все' : cat}</span>`).join('');
        let productsHtml = filtered.map(p => `
            <div class="product-card">
                <h3>${escapeHtml(p.name)}</h3>
                <div class="stat-row"><span>💰 Цена</span><span>${p.price} ₽</span></div>
                <button class="add-to-cart" data-id="${p.id}" data-name="${escapeHtml(p.name)}" data-price="${p.price}">В корзину</button>
            </div>
        `).join('');
        return `<div class="categories">${chips}</div><div class="products-grid" id="productsGrid">${productsHtml}</div>`;
    }
    
    function escapeHtml(str) { 
        if(!str) return '';
        return str.replace(/[&<>]/g, function(m){
            if(m==='&') return '&amp;';
            if(m==='<') return '&lt;';
            if(m==='>') return '&gt;';
            return m;
        });
    }
    
    function renderProfile() {
        return `<div class="glass-card" style="text-align:center">
            <span style="font-size:64px;">👑</span>
            <h2>${escapeHtml(user.first_name)}</h2>
            <div class="stat-row"><span>💰 Баланс</span><span>${balance} ₽</span></div>
            <div class="stat-row"><span>📦 Заказов</span><span>${totalOrders}</span></div>
            <button class="btn-primary" id="supportBtn">📞 Техподдержка</button>
            <button class="btn-primary" id="rulesBtn">📝 Правила</button>
        </div>`;
    }
    
    function renderBalance() {
        return `<div class="glass-card">
            <div class="stat-row"><span>💰 Баланс</span><span>${balance} ₽</span></div>
            <div class="stat-row"><span>📦 Заказов</span><span>${totalOrders}</span></div>
            <div class="stat-row"><span>⚙️ В процессе</span><span>${pendingOrders}</span></div>
            <button class="btn-primary" id="replenishBtn">💸 Пополнить баланс</button>
        </div>`;
    }
    
    function renderCart() {
        if(cart.length === 0) return `<div class="glass-card" style="text-align:center">🛒 Корзина пуста</div>`;
        let total = cart.reduce((s,i) => s + i.price * i.qty, 0);
        return `<div class="glass-card">
            ${cart.map(i => `<div class="stat-row"><span>${escapeHtml(i.name)} x${i.qty}</span><span>${i.price * i.qty} ₽</span><button class="del-cart" data-id="${i.id}">❌</button></div>`).join('')}
            <div class="stat-row"><strong>Итого</strong><strong>${total} ₽</strong></div>
            <button class="btn-primary" id="orderBtn">Оформить заказ</button>
        </div>`;
    }
    
    function renderFaq() {
        return `<div class="glass-card"><h3>🔍 Частые вопросы</h3><p>⚡ Мгновенная выдача</p><p>🛡 Гарантия 30 дней</p><p>💳 Оплата: карты, крипта, Stars</p></div>`;
    }
    
    // ==================== АДМИНКА ====================
    function renderAdmin() {
        if (!isAdmin) return `<div class="glass-card">⛔ У вас нет доступа к админ-панели.</div>`;
        return `
            <div class="admin-badge">🔐 АДМИН-ПАНЕЛЬ</div>
            <div class="glass-card">
                <button class="btn-primary" id="addProductBtn">➕ Добавить товар</button>
                <button class="btn-primary" id="editProductsBtn">📋 Редактировать товары</button>
                <button class="btn-primary" id="manageItemsBtn">⚙️ Управление автовыдачей</button>
                <button class="btn-primary btn-secondary" id="refreshBtn">🔄 Обновить каталог</button>
            </div>
            <div id="adminContent"></div>
        `;
    }
    
    function showAddForm() {
        document.getElementById('adminContent').innerHTML = `
            <div class="glass-card">
                <h3>➕ Новый товар</h3>
                <input type="text" id="prodName" placeholder="Название">
                <input type="number" id="prodPrice" placeholder="Цена">
                <input type="text" id="prodCategory" placeholder="Категория (premium/keys/accounts/boost)">
                <textarea id="prodDesc" placeholder="Описание"></textarea>
                <input type="text" id="prodPhoto" placeholder="Ссылка на фото">
                <button class="btn-primary" id="saveProductBtn">Сохранить</button>
                <button class="btn-primary btn-secondary" id="cancelAdminBtn">Отмена</button>
            </div>
        `;
        const saveBtn = document.getElementById('saveProductBtn');
        if(saveBtn) {
            saveBtn.onclick = async function() {
                const name = document.getElementById('prodName').value;
                const price = parseInt(document.getElementById('prodPrice').value);
                const category = document.getElementById('prodCategory').value;
                const description = document.getElementById('prodDesc').value;
                const photo_url = document.getElementById('prodPhoto').value;
                if (!name || !price || !category) {
                    tg.showPopup({title: "Ошибка", message: "Заполните название, цену и категорию!", buttons:[{type:"ok"}]});
                    return;
                }
                const result = await sendRequest('add_product', {name, price, category, description, photo_url});
                if(result.success) {
                    tg.showPopup({title: "Успех", message: "Товар добавлен!", buttons:[{type:"ok"}]});
                    await loadData();
                    showProductList();
                } else {
                    tg.showPopup({title: "Ошибка", message: "Не удалось добавить товар", buttons:[{type:"ok"}]});
                }
            };
        }
        const cancelBtn = document.getElementById('cancelAdminBtn');
        if(cancelBtn) cancelBtn.onclick = () => renderAdminContent();
    }
    
    async function showProductList() {
        if (allProducts.length === 0) {
            document.getElementById('adminContent').innerHTML = `<div class="glass-card">📭 Нет товаров</div>`;
            return;
        }
        let html = `<div class="glass-card"><h3>📋 Список товаров</h3>`;
        for (let p of allProducts) {
            html += `
                <div class="product-card" style="margin:10px 0">
                    <strong>${escapeHtml(p.name)}</strong> — ${p.price}₽ (${escapeHtml(p.category)})
                    <button class="btn-primary edit-product" data-id="${p.id}">✏️ Редактировать</button>
                    <button class="btn-primary btn-danger delete-product" data-id="${p.id}">🗑 Удалить</button>
                </div>
            `;
        }
        html += `<button class="btn-primary btn-secondary" id="backAdminBtn">🔙 Назад</button></div>`;
        document.getElementById('adminContent').innerHTML = html;
        
        document.querySelectorAll('.edit-product').forEach(btn => {
            btn.onclick = () => editProductById(parseInt(btn.dataset.id));
        });
        document.querySelectorAll('.delete-product').forEach(btn => {
            btn.onclick = () => deleteProductById(parseInt(btn.dataset.id));
        });
        const backBtn = document.getElementById('backAdminBtn');
        if(backBtn) backBtn.onclick = () => renderAdminContent();
    }
    
    async function editProductById(id) {
        let product = allProducts.find(p => p.id === id);
        if(!product) return;
        document.getElementById('adminContent').innerHTML = `
            <div class="glass-card">
                <h3>✏️ Редактировать: ${escapeHtml(product.name)}</h3>
                <input type="text" id="editName" value="${escapeHtml(product.name)}" placeholder="Название">
                <input type="number" id="editPrice" value="${product.price}" placeholder="Цена">
                <input type="text" id="editCategory" value="${escapeHtml(product.category)}" placeholder="Категория">
                <textarea id="editDesc" placeholder="Описание">${product.description || ''}</textarea>
                <input type="text" id="editPhoto" value="${product.photo_url || ''}" placeholder="Ссылка на фото">
                <div class="stat-row"><span>Активен:</span><input type="checkbox" id="editActive" ${product.is_active ? 'checked' : ''} style="width:30px;"></div>
                <button class="btn-primary" id="updateProductBtn">Сохранить</button>
                <button class="btn-primary btn-secondary" id="cancelProductBtn">Отмена</button>
            </div>
        `;
        const updateBtn = document.getElementById('updateProductBtn');
        if(updateBtn) {
            updateBtn.onclick = async () => {
                let name = document.getElementById('editName').value;
                let price = parseInt(document.getElementById('editPrice').value);
                let category = document.getElementById('editCategory').value;
                let description = document.getElementById('editDesc').value;
                let photo_url = document.getElementById('editPhoto').value;
                let is_active = document.getElementById('editActive').checked ? 1 : 0;
                await sendRequest('update_product', {product_id: id, name, price, category, description, photo_url, is_active});
                await loadData();
                showProductList();
            };
        }
        const cancelBtn = document.getElementById('cancelProductBtn');
        if(cancelBtn) cancelBtn.onclick = () => showProductList();
    }
    
    async function deleteProductById(id) {
        tg.showPopup({
            title: "Подтверждение",
            message: "Удалить товар?",
            buttons: [{type:"ok", text:"✅ Да"},{type:"cancel", text:"❌ Нет"}]
        }, async (btn) => {
            if (btn === 'ok') {
                await sendRequest('delete_product', {product_id: id});
                await loadData();
                showProductList();
            }
        });
    }
    
    async function showItemsManagement() {
        if (allProducts.length === 0) {
            document.getElementById('adminContent').innerHTML = `<div class="glass-card">📭 Нет товаров</div>`;
            return;
        }
        let html = `<div class="glass-card"><h3>⚙️ Управление автовыдачей</h3>`;
        for (let p of allProducts) {
            html += `<div class="product-card" style="margin:10px 0"><strong>${escapeHtml(p.name)}</strong><button class="btn-primary manage-items" data-id="${p.id}" data-name="${escapeHtml(p.name).replace(/'/g, "\\'")}">📦 Управление аккаунтами</button></div>`;
        }
        html += `<button class="btn-primary btn-secondary" id="backAdminBtn2">🔙 Назад</button></div>`;
        document.getElementById('adminContent').innerHTML = html;
        
        document.querySelectorAll('.manage-items').forEach(btn => {
            btn.onclick = () => showItemsForProduct(parseInt(btn.dataset.id), btn.dataset.name);
        });
        const backBtn = document.getElementById('backAdminBtn2');
        if(backBtn) backBtn.onclick = () => renderAdminContent();
    }
    
    async function showItemsForProduct(productId, productName) {
        let items = await sendRequest('get_items', {product_id: productId});
        let html = `<div class="glass-card">
            <h3>📦 Аккаунты для: ${escapeHtml(productName)}</h3>
            <input type="text" id="newItem" placeholder="логин:пароль или ключ" style="width:100%;">
            <button class="btn-primary" id="addItemBtn">➕ Добавить</button>
            <hr>`;
        if (items.items && items.items.length) {
            for (let item of items.items) {
                let status = item.is_sold ? '🔴 ПРОДАН' : '🟢 В НАЛИЧИИ';
                html += `<div class="stat-row"><span>${escapeHtml(item.data.substring(0,40))}</span><span>${status}</span><button class="btn-primary btn-danger delete-item" data-id="${item.id}">❌</button></div>`;
            }
        } else { html += `<div>Нет аккаунтов</div>`; }
        html += `<button class="btn-primary btn-secondary" id="backItemsBtn">🔙 Назад</button></div>`;
        document.getElementById('adminContent').innerHTML = html;
        
        const addBtn = document.getElementById('addItemBtn');
        if(addBtn) {
            addBtn.onclick = async () => {
                let val = document.getElementById('newItem').value;
                if (!val) return;
                await sendRequest('add_item', {product_id: productId, item_data: val});
                await showItemsForProduct(productId, productName);
            };
        }
        document.querySelectorAll('.delete-item').forEach(btn => {
            btn.onclick = async () => {
                await sendRequest('delete_item', {item_id: parseInt(btn.dataset.id)});
                await showItemsForProduct(productId, productName);
            };
        });
        const backBtn = document.getElementById('backItemsBtn');
        if(backBtn) backBtn.onclick = () => showItemsManagement();
    }
    
    function renderAdminContent() {
        document.getElementById('adminContent').innerHTML = `
            <div class="admin-badge">🔐 АДМИН-ПАНЕЛЬ</div>
            <div class="glass-card">
                <button class="btn-primary" id="addProductBtn">➕ Добавить товар</button>
                <button class="btn-primary" id="editProductsBtn">📋 Редактировать товары</button>
                <button class="btn-primary" id="manageItemsBtn">⚙️ Управление автовыдачей</button>
                <button class="btn-primary btn-secondary" id="refreshBtn">🔄 Обновить каталог</button>
            </div>
        `;
        const addBtn = document.getElementById('addProductBtn');
        if(addBtn) addBtn.onclick = () => showAddForm();
        const editBtn = document.getElementById('editProductsBtn');
        if(editBtn) editBtn.onclick = () => showProductList();
        const manageBtn = document.getElementById('manageItemsBtn');
        if(manageBtn) manageBtn.onclick = () => showItemsManagement();
        const refreshBtn = document.getElementById('refreshBtn');
        if(refreshBtn) refreshBtn.onclick = async () => { await loadData(); renderCurrentTab(); };
    }
    
    function renderCurrentTab() {
        const container = document.getElementById('content');
        if (currentTab === 'catalog') container.innerHTML = renderCatalog();
        else if (currentTab === 'profile') container.innerHTML = renderProfile();
        else if (currentTab === 'balance') container.innerHTML = renderBalance();
        else if (currentTab === 'cart') container.innerHTML = renderCart();
        else if (currentTab === 'faq') container.innerHTML = renderFaq();
        else if (currentTab === 'admin') {
            container.innerHTML = renderAdmin();
            if (isAdmin) renderAdminContent();
        }
        
        if (currentTab === 'catalog') {
            document.querySelectorAll('.add-to-cart').forEach(btn => {
                btn.onclick = () => {
                    let id = parseInt(btn.dataset.id);
                    let name = btn.dataset.name;
                    let price = parseInt(btn.dataset.price);
                    let exist = cart.find(i => i.id === id);
                    if (exist) exist.qty++;
                    else cart.push({id, name, price, qty: 1});
                    tg.showPopup({title: "Добавлено", message: `${name} в корзине`, buttons:[{type:"ok"}]});
                };
            });
            document.querySelectorAll('.category-chip').forEach(chip => {
                chip.onclick = () => {
                    currentCategory = chip.dataset.cat;
                    renderCurrentTab();
                };
            });
        }
        if (currentTab === 'cart') {
            document.querySelectorAll('.del-cart').forEach(btn => {
                btn.onclick = () => {
                    cart = cart.filter(i => i.id !== parseInt(btn.dataset.id));
                    renderCurrentTab();
                };
            });
            let orderBtn = document.getElementById('orderBtn');
            if (orderBtn) orderBtn.onclick = async () => {
                let total = cart.reduce((s,i) => s + i.price * i.qty, 0);
                if (balance >= total) {
                    let result = await sendRequest('order', {items: cart, total});
                    if (result.success) {
                        balance = result.new_balance;
                        totalOrders++;
                        cart = [];
                        renderCurrentTab();
                        tg.showPopup({title: "✅ Успех", message: "Заказ оформлен!", buttons:[{type:"ok"}]});
                    } else tg.showPopup({title: "Ошибка", message: result.error, buttons:[{type:"ok"}]});
                } else tg.showPopup({title: "Ошибка", message: "Недостаточно средств", buttons:[{type:"ok"}]});
            };
        }
        let supportBtn = document.getElementById('supportBtn');
        if (supportBtn) supportBtn.onclick = () => window.open('https://t.me/MarketAura_bot?start=support');
        let rulesBtn = document.getElementById('rulesBtn');
        if (rulesBtn) rulesBtn.onclick = () => window.open('https://clearly-first-adamite.tilda.ws/auramarketpravila', '_blank');
        let replenishBtn = document.getElementById('replenishBtn');
        if (replenishBtn) replenishBtn.onclick = () => tg.showPopup({title: "Пополнение", message: "Скоро появится", buttons:[{type:"ok"}]});
    }
    
    document.querySelectorAll('.nav-item').forEach(btn => {
        btn.onclick = () => {
            currentTab = btn.dataset.tab;
            document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            renderCurrentTab();
        };
    });
    
    loadData();
</script>
</body>
</html>
