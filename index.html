<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>AuraMarket | Каталог</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: radial-gradient(circle at 20% 30%, #0a0a0f, #030308);
            font-family: 'Montserrat', system-ui;
            color: white;
            padding: 20px;
            padding-bottom: 30px;
        }
        .card {
            background: rgba(20,20,40,0.65);
            backdrop-filter: blur(16px);
            border-radius: 28px;
            padding: 20px;
            margin: 12px 0;
            border: 1px solid rgba(179,0,255,0.35);
        }
        .price {
            color: #b300ff;
            font-size: 20px;
            font-weight: bold;
        }
        .category {
            font-size: 12px;
            color: #aaa;
            margin-top: 5px;
        }
        .empty {
            text-align: center;
            padding: 40px;
            color: #aaa;
        }
        .logo {
            text-align: center;
            margin-bottom: 20px;
        }
        .logo span {
            font-size: 42px;
            font-weight: 900;
            background: linear-gradient(145deg, #fff, #b300ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .loading {
            text-align: center;
            padding: 40px;
            color: #b300ff;
        }
    </style>
</head>
<body>
    <div class="logo">
        <span>AuraMarket</span>
        <div style="font-size:12px; color:#b300ff;">Каталог товаров</div>
    </div>
    
    <div id="products" class="loading">⏳ Загрузка товаров...</div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        
        async function loadProducts() {
            try {
                // Отправляем запрос на получение товаров
                const requestData = JSON.stringify({ action: 'get_products' });
                console.log("📤 Отправляем:", requestData);
                
                const response = await tg.sendData(requestData);
                console.log("📥 Получен ответ:", response);
                
                // Парсим ответ
                let data;
                try {
                    data = JSON.parse(response);
                } catch(e) {
                    console.error("Ошибка парсинга JSON:", e);
                    document.getElementById('products').innerHTML = '<div class="empty">❌ Ошибка: неверный ответ от бота</div>';
                    return;
                }
                
                console.log("📦 Товары:", data.products);
                
                // Отображаем товары
                if (data.products && data.products.length > 0) {
                    document.getElementById('products').innerHTML = data.products.map(p => `
                        <div class="card">
                            <div style="font-size:18px; font-weight:bold;">${escapeHtml(p.name)}</div>
                            <div class="price">💰 ${p.price} ₽</div>
                            <div class="category">📁 ${escapeHtml(p.category)}</div>
                            <div style="font-size:12px; margin-top:8px;">${p.description ? escapeHtml(p.description.substring(0, 80)) : ''}</div>
                        </div>
                    `).join('');
                } else {
                    document.getElementById('products').innerHTML = '<div class="empty">❌ В каталоге пока нет товаров<br><br>Добавьте товары через админ-панель бота</div>';
                }
            } catch(e) {
                console.error("Ошибка:", e);
                document.getElementById('products').innerHTML = '<div class="empty">❌ Ошибка загрузки товаров<br><br>Проверьте подключение к боту</div>';
            }
        }
        
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }
        
        // Загружаем товары при открытии
        loadProducts();
    </script>
</body>
</html>
