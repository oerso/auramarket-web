<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>AuraMarket | Mini App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0a0a0f 0%, #1a0b2e 100%);
            font-family: 'Segoe UI', 'Montserrat', system-ui, -apple-system, sans-serif;
            color: #fff;
            padding-bottom: 80px;
            min-height: 100vh;
        }

        /* Кастомный скролл */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: #1a1a2e; }
        ::-webkit-scrollbar-thumb { background: #b300ff; border-radius: 4px; }

        /* Шапка */
        .header {
            background: rgba(10, 10, 20, 0.8);
            backdrop-filter: blur(10px);
            padding: 15px 20px;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid rgba(179, 0, 255, 0.3);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #b300ff, #6a00ff);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 20px;
            box-shadow: 0 0 15px rgba(179, 0, 255, 0.5);
        }

        .logo-text {
            font-size: 20px;
            font-weight: bold;
            background: linear-gradient(90deg, #fff, #b300ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .balance-card {
            background: rgba(0, 0, 0, 0.5);
            border-radius: 20px;
            padding: 8px 18px;
            border: 1px solid rgba(179, 0, 255, 0.3);
            text-align: center;
        }

        .balance-label {
            font-size: 11px;
            color: #aaa;
        }

        .balance-value {
            font-size: 18px;
            font-weight: bold;
            color: #b300ff;
        }

        /* Категории */
        .categories {
            display: flex;
            gap: 10px;
            padding: 15px 20px;
            overflow-x: auto;
            white-space: nowrap;
        }

        .category {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 30px;
            padding: 8px 20px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s ease;
            border: 1px solid rgba(179, 0, 255, 0.2);
        }

        .category.active {
            background: linear-gradient(90deg, #b300ff, #6a00ff);
            border-color: transparent;
            box-shadow: 0 0 10px rgba(179, 0, 255, 0.5);
        }

        /* Сетка товаров */
        .products {
            padding: 20px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 16px;
        }

        .product-card {
            background: rgba(20, 20, 40, 0.6);
            backdrop-filter: blur(5px);
            border-radius: 20px;
            padding: 16px;
            border: 1px solid rgba(179, 0, 255, 0.2);
            transition: all 0.2s ease;
        }

        .product-card:hover {
            transform: translateY(-4px);
            border-color: #b300ff;
            box-shadow: 0 0 20px rgba(179, 0, 255, 0.3);
        }

        .product-image {
            width: 100%;
            height: 140px;
            background: linear-gradient(135deg, #2a1a3a, #1a0b2e);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
        }

        .product-title {
            font-size: 16px;
            font-weight: 600;
            margin: 12px 0 8px;
        }

        .product-price {
            font-size: 20px;
            font-weight: bold;
            color: #b300ff;
        }

        .buy-btn {
            background: linear-gradient(90deg, #b300ff, #6a00ff);
            border: none;
            border-radius: 12px;
            padding: 10px;
            color: white;
            font-weight: bold;
            margin-top: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            width: 100%;
        }

        .buy-btn:active {
            transform: scale(0.97);
        }

        /* Корзина */
        .cart-panel {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(10, 10, 20, 0.95);
            backdrop-filter: blur(15px);
            border-top: 1px solid #b300ff;
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 200;
        }

        .cart-total {
            font-size: 18px;
            font-weight: bold;
        }

        .cart-total span {
            color: #b300ff;
        }

        .checkout-btn {
            background: linear-gradient(90deg, #b300ff, #6a00ff);
            border: none;
            border-radius: 30px;
            padding: 10px 25px;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }

        /* Профиль */
        .profile-section {
            padding: 20px;
            text-align: center;
        }

        .avatar {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #b300ff, #6a00ff);
            border-radius: 50%;
            margin: 0 auto 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
        }

        .level-badge {
            display: inline-block;
            background: rgba(179, 0, 255, 0.2);
            border-radius: 20px;
            padding: 5px 15px;
            font-size: 12px;
            margin: 10px 0;
        }

        /* Скрытие элементов */
        .hidden {
            display: none;
        }

        /* Подсветка кнопки закрытия */
        .close-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(179, 0, 255, 0.3);
            border-radius: 12px;
            padding: 8px 16px;
            cursor: pointer;
            font-size: 14px;
        }
    </style>
</head>
<body>

<div class="header">
    <div class="logo">
        <div class="logo-icon">A</div>
        <div class="logo-text">AuraMarket</div>
    </div>
    <div class="balance-card">
        <div class="balance-label">Баланс</div>
        <div class="balance-value" id="balance">0 ₽</div>
    </div>
</div>

<!-- Навигация по категориям -->
<div class="categories">
    <div class="category active" data-cat="all">Все</div>
    <div class="category" data-cat="premium">Premium</div>
    <div class="category" data-cat="keys">Ключи</div>
    <div class="category" data-cat="accounts">Аккаунты</div>
    <div class="category" data-cat="boost">Накрутка</div>
</div>

<!-- Список товаров / Профиль / Корзина (вкладки) -->
<div id="catalogSection">
    <div class="products" id="productsContainer"></div>
</div>

<div id="profileSection" class="hidden">
    <div class="profile-section">
        <div class="avatar">👤</div>
        <h3 id="profileName">Пользователь</h3>
        <div class="level-badge" id="profileLevel">🟣 Новичок</div>
        <div class="balance-card" style="margin-top: 20px; display: inline-block;">
            <div class="balance-label">Баланс</div>
            <div class="balance-value" id="profileBalance">0 ₽</div>
        </div>
    </div>
</div>

<div id="cartSection" class="hidden">
    <div class="products" id="cartContainer"></div>
    <div style="padding: 20px; text-align: center;" id="emptyCart">Корзина пуста</div>
</div>

<!-- Панель корзины -->
<div class="cart-panel">
    <div class="cart-total">Итого: <span id="cartTotal">0</span> ₽</div>
    <button class="checkout-btn" id="checkoutBtn">Оформить заказ</button>
</div>

<script>
    // Инициализация Telegram WebApp
    let tg = window.Telegram.WebApp;
    tg.expand();
    tg.MainButton.hide();

    // Получение данных пользователя из Telegram
    let user = tg.initDataUnsafe?.user || { id: 0, username: 'Гость', first_name: 'Пользователь' };
    document.getElementById('profileName').innerText = user.first_name || user.username || 'Пользователь';

    // Баланс (позже можно подтягивать от бота)
    let userBalance = 250; // временно, потом через бота
    document.getElementById('balance').innerText = userBalance + ' ₽';
    document.getElementById('profileBalance').innerText = userBalance + ' ₽';

    // Товары (временный каталог)
    const products = [
        { id: 1, name: 'Telegram Premium (месяц)', price: 129, category: 'premium', emoji: '💎' },
        { id: 2, name: 'Ключ Windows 11 Pro', price: 149, category: 'keys', emoji: '🔑' },
        { id: 3, name: 'TikTok аккаунт (USA)', price: 89, category: 'accounts', emoji: '📱' },
        { id: 4, name: 'Накрутка TikTok 1000 подписчиков', price: 79, category: 'boost', emoji: '📈' },
        { id: 5, name: 'ChatGPT аккаунт', price: 49, category: 'accounts', emoji: '🤖' },
        { id: 6, name: 'Discord аккаунт (Nitro)', price: 199, category: 'premium', emoji: '🎮' },
        { id: 7, name: 'Steam ключ (игра)', price: 99, category: 'keys', emoji: '🎲' },
        { id: 8, name: 'Instagram лайки (1000)', price: 59, category: 'boost', emoji: '❤️' }
    ];

    // Корзина
    let cart = [];

    // Текущая категория
    let currentCategory = 'all';

    // Отображение товаров
    function renderProducts() {
        const container = document.getElementById('productsContainer');
        let filtered = products;
        if (currentCategory !== 'all') {
            filtered = products.filter(p => p.category === currentCategory);
        }
        container.innerHTML = filtered.map(p => `
            <div class="product-card" data-id="${p.id}">
                <div class="product-image">${p.emoji}</div>
                <div class="product-title">${p.name}</div>
                <div class="product-price">${p.price} ₽</div>
                <button class="buy-btn" data-id="${p.id}" data-name="${p.name}" data-price="${p.price}">В корзину</button>
            </div>
        `).join('');

        // Обработчики для кнопок "В корзину"
        document.querySelectorAll('.buy-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                const id = parseInt(btn.dataset.id);
                const name = btn.dataset.name;
                const price = parseInt(btn.dataset.price);
                addToCart({ id, name, price });
            });
        });
    }

    // Добавление в корзину
    function addToCart(product) {
        const existing = cart.find(item => item.id === product.id);
        if (existing) {
            existing.quantity += 1;
        } else {
            cart.push({ ...product, quantity: 1 });
        }
        updateCartUI();
        tg.showPopup({ title: 'Добавлено', message: `${product.name} добавлен в корзину`, buttons: [{ type: 'ok' }] });
    }

    // Обновление интерфейса корзины
    function updateCartUI() {
        const total = cart.reduce((sum, item) => sum + item.price * item.quantity, 0);
        document.getElementById('cartTotal').innerText = total;
        
        const cartContainer = document.getElementById('cartContainer');
        const emptyCartDiv = document.getElementById('emptyCart');
        
        if (cart.length === 0) {
            cartContainer.classList.add('hidden');
            emptyCartDiv.classList.remove('hidden');
        } else {
            cartContainer.classList.remove('hidden');
            emptyCartDiv.classList.add('hidden');
            cartContainer.innerHTML = cart.map(item => `
                <div class="product-card">
                    <div class="product-title">${item.name}</div>
                    <div class="product-price">${item.price} ₽ × ${item.quantity} = ${item.price * item.quantity} ₽</div>
                    <button class="buy-btn" onclick="removeFromCart(${item.id})">Удалить</button>
                </div>
            `).join('');
        }
    }

    // Удаление из корзины
    window.removeFromCart = (id) => {
        cart = cart.filter(item => item.id !== id);
        updateCartUI();
    };

    // Оформление заказа (отправка в бота)
    function checkout() {
        if (cart.length === 0) {
            tg.showPopup({ title: 'Корзина пуста', message: 'Добавьте товары для заказа', buttons: [{ type: 'ok' }] });
            return;
        }
        const total = cart.reduce((sum, item) => sum + item.price * item.quantity, 0);
        if (userBalance < total) {
            tg.showPopup({ title: 'Недостаточно средств', message: `Требуется ${total} ₽. Пополните баланс.`, buttons: [{ type: 'ok' }] });
            return;
        }
        // Отправка данных в бота
        const orderData = { action: 'order', items: cart, total: total, user_id: user.id };
        tg.sendData(JSON.stringify(orderData));
        tg.showPopup({ title: 'Заказ оформлен', message: 'Ожидайте выдачу товаров в боте', buttons: [{ type: 'ok' }] });
        cart = [];
        updateCartUI();
    }

    document.getElementById('checkoutBtn').addEventListener('click', checkout);

    // Переключение категорий
    document.querySelectorAll('.category').forEach(cat => {
        cat.addEventListener('click', () => {
            document.querySelectorAll('.category').forEach(c => c.classList.remove('active'));
            cat.classList.add('active');
            currentCategory = cat.dataset.cat;
            renderProducts();
        });
    });

    // Простая навигация по вкладкам (для демо)
    let currentTab = 'catalog';

    function showTab(tab) {
        currentTab = tab;
        document.getElementById('catalogSection').classList.add('hidden');
        document.getElementById('profileSection').classList.add('hidden');
        document.getElementById('cartSection').classList.add('hidden');
        if (tab === 'catalog') document.getElementById('catalogSection').classList.remove('hidden');
        if (tab === 'profile') document.getElementById('profileSection').classList.remove('hidden');
        if (tab === 'cart') document.getElementById('cartSection').classList.remove('hidden');
    }

    // Кнопки навигации внизу (добавим три большие кнопки в меню бота)
    const container = document.createElement('div');
    container.style.position = 'fixed';
    container.style.bottom = '70px';
    container.style.left = '0';
    container.style.right = '0';
    container.style.display = 'flex';
    container.style.justifyContent = 'center';
    container.style.gap = '20px';
    container.style.padding = '10px';
    container.style.background = 'rgba(10,10,20,0.9)';
    container.style.backdropFilter = 'blur(10px)';
    container.style.borderTop = '1px solid rgba(179,0,255,0.3)';
    const btnCatalog = document.createElement('button');
    btnCatalog.innerText = '🛍️ Каталог';
    btnCatalog.style.padding = '8px 20px';
    btnCatalog.style.borderRadius = '30px';
    btnCatalog.style.border = 'none';
    btnCatalog.style.background = '#b300ff';
    btnCatalog.style.color = 'white';
    btnCatalog.style.cursor = 'pointer';
    btnCatalog.onclick = () => showTab('catalog');
    const btnProfile = document.createElement('button');
    btnProfile.innerText = '👤 Профиль';
    btnProfile.style.padding = '8px 20px';
    btnProfile.style.borderRadius = '30px';
    btnProfile.style.border = '1px solid rgba(179,0,255,0.5)';
    btnProfile.style.background = 'transparent';
    btnProfile.style.color = 'white';
    btnProfile.style.cursor = 'pointer';
    btnProfile.onclick = () => showTab('profile');
    const btnCart = document.createElement('button');
    btnCart.innerText = '🛒 Корзина';
    btnCart.style.padding = '8px 20px';
    btnCart.style.borderRadius = '30px';
    btnCart.style.border = '1px solid rgba(179,0,255,0.5)';
    btnCart.style.background = 'transparent';
    btnCart.style.color = 'white';
    btnCart.style.cursor = 'pointer';
    btnCart.onclick = () => { showTab('cart'); updateCartUI(); };
    container.appendChild(btnCatalog);
    container.appendChild(btnProfile);
    container.appendChild(btnCart);
    document.body.appendChild(container);

    // Показываем каталог по умолчанию
    showTab('catalog');
    renderProducts();
</script>

</body>
</html>
