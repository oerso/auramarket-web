 <!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>AuraMarket | Mini App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
        body {
            background: radial-gradient(circle at 20% 30%, #0a0a0f, #030308);
            font-family: 'Montserrat', 'Segoe UI', system-ui, sans-serif;
            color: white;
            min-height: 100vh;
            padding-bottom: 85px;
        }
        /* анимированное свечение */
        .glow {
            animation: pulse 3s infinite;
        }
        @keyframes pulse {
            0% { text-shadow: 0 0 2px #b300ff; }
            100% { text-shadow: 0 0 15px #b300ff; }
        }
        .glass-card {
            background: rgba(20, 20, 40, 0.65);
            backdrop-filter: blur(16px);
            border-radius: 32px;
            padding: 22px;
            margin: 16px;
            border: 1px solid rgba(179,0,255,0.35);
            transition: 0.25s;
        }
        .glass-card:hover { border-color: #b300ff; transform: translateY(-3px); }
        .btn-primary {
            background: linear-gradient(90deg, #b300ff, #6a00ff);
            border: none;
            width: 100%;
            padding: 14px;
            border-radius: 60px;
            font-weight: bold;
            font-size: 16px;
            color: white;
            cursor: pointer;
            transition: 0.2s;
        }
        .btn-primary:active { transform: scale(0.96); }
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 16px;
            padding: 10px;
        }
        .product-card {
            background: rgba(25,25,50,0.7);
            backdrop-filter: blur(10px);
            border-radius: 28px;
            padding: 16px;
            border: 1px solid rgba(179,0,255,0.25);
            transition: 0.2s;
        }
        .product-card:hover { border-color: #b300ff; transform: scale(1.01); }
        .stat-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid rgba(179,0,255,0.2); }
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(8,8,16,0.96);
            backdrop-filter: blur(20px);
            display: flex;
            justify-content: space-around;
            padding: 8px 16px 22px;
            border-top: 1px solid #b300ff;
        }
        .nav-item {
            background: transparent;
            border: none;
            color: #aaa;
            font-size: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            cursor: pointer;
            transition: 0.2s;
            padding: 6px 12px;
            border-radius: 40px;
        }
        .nav-item.active { color: #b300ff; text-shadow: 0 0 6px #b300ff; background: rgba(179,0,255,0.15); }
        .hidden { display: none; }
        .logo-3d {
            width: 70px; height: 70px;
            background: linear-gradient(135deg, #1e0b32, #0a0a0f);
            border-radius: 28px;
            margin: 0 auto 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
            box-shadow: 0 0 20px #b300ff;
        }
        .logo-letter { font-size: 42px; font-weight: 900; background: linear-gradient(145deg, #fff, #b300ff); -webkit-background-clip: text; background-clip: text; color: transparent; }
    </style>
</head>
<body>

<div class="glass-card" style="text-align:center">
    <div class="logo-3d"><span class="logo-letter">A</span><span class="logo-letter">M</span></div>
    <div style="font-size:26px; font-weight:800;">AuraMarket</div>
    <div style="font-size:12px; color:#b300ff;">премиум цифровой магазин</div>
</div>

<div id="content"></div>
<div class="bottom-nav">
    <button class="nav-item" data-tab="catalog"><span>🛍️</span><span>Каталог</span></button>
    <button class="nav-item" data-tab="profile"><span>👤</span><span>Профиль</span></button>
    <button class="nav-item" data-tab="balance"><span>💵</span><span>Баланс</span></button>
    <button class="nav-item" data-tab="cart"><span>🛒</span><span>Корзина</span></button>
    <button class="nav-item" data-tab="faq"><span>❓</span><span>FAQ</span></button>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();
    const user = tg.initDataUnsafe?.user || { id: 0, username: 'user', first_name: 'Гость' };
    let balance = 0, totalOrders = 0, pendingOrders = 0;
    let cart = [];
    let currentTab = 'catalog';

    const products = [
        { id:1, name:"Telegram Premium 1 мес", price:129, emoji:"💎", category:"premium" },
        { id:2, name:"Ключ Windows 11 Pro", price:149, emoji:"🔑", category:"keys" },
        { id:3, name:"TikTok USA аккаунт", price:89, emoji:"📱", category:"accounts" },
        { id:4, name:"Накрутка TikTok 1000", price:79, emoji:"📈", category:"boost" },
        { id:5, name:"ChatGPT Plus", price:199, emoji:"🤖", category:"premium" },
        { id:6, name:"Discord Nitro месяц", price:299, emoji:"🎮", category:"premium" },
        { id:7, name:"Steam ключ", price:99, emoji:"🎲", category:"keys" },
        { id:8, name:"Instagram 1000 лайков", price:59, emoji:"❤️", category:"boost" }
    ];

    async function fetchBalance() {
        const data = await tg.sendData(JSON.stringify({ action: 'get_data' }));
        // Здесь на практике получим ответ, сейчас демо
        balance = 12750; totalOrders = 12; pendingOrders = 2;
        renderCurrentTab();
    }

    function renderCatalog(activeCat='all') {
        let filtered = products;
        if(activeCat!=='all') filtered = products.filter(p=>p.category===activeCat);
        return `<div style="padding:10px"><div style="display:flex; gap:10px; overflow-x:auto; margin-bottom:16px;">
            <button class="category-btn" data-cat="all">Все</button>
            <button class="category-btn" data-cat="premium">💎 Premium</button>
            <button class="category-btn" data-cat="keys">🔑 Ключи</button>
            <button class="category-btn" data-cat="accounts">👤 Аккаунты</button>
            <button class="category-btn" data-cat="boost">📈 Накрутка</button>
        </div><div class="products-grid" id="productsGrid"></div></div>`;
    }

    function renderProfile() {
        return `<div class="glass-card"><div style="text-align:center"><span style="font-size:64px;">👑</span><h2>${user.first_name}</h2><div>@${user.username}</div><div class="stat-row"><span>💰 Баланс</span><span>${balance} ₽</span></div><div class="stat-row"><span>📦 Заказов</span><span>${totalOrders}</span></div></div><button class="btn-primary" id="supportBtn">📞 Техподдержка</button><button class="btn-primary" id="rulesBtn">📝 Правила</button></div>`;
    }

    function renderBalance() {
        return `<div class="glass-card"><div class="stat-row"><span>💰 Баланс</span><span>${balance} ₽</span></div><div class="stat-row"><span>📦 Всего заказов</span><span>${totalOrders}</span></div><div class="stat-row"><span>⚙️ Активных заказов</span><span>${pendingOrders}</span></div><button class="btn-primary" id="replenishBtn">💸 Пополнить баланс</button></div>`;
    }

    function renderCart() {
        if(cart.length===0) return `<div class="glass-card" style="text-align:center">🛒 Корзина пуста</div>`;
        let total = cart.reduce((s,i)=>s + i.price * i.qty,0);
        return `<div class="glass-card">${cart.map(i=>`<div class="stat-row"><span>${i.name} x${i.qty}</span><span>${i.price*i.qty} ₽</span><button class="del-cart" data-id="${i.id}">❌</button></div>`).join('')}<div class="stat-row"><strong>Итого</strong><strong>${total} ₽</strong></div><button class="btn-primary" id="orderBtn">Оформить заказ</button></div>`;
    }

    function renderFaq() {
        return `<div class="glass-card"><h3>🔍 Частые вопросы</h3><p><strong>⚡ Мгновенная выдача</strong> — данные сразу после оплаты</p><p><strong>🛡 Гарантия 30 дней</strong> — замена при проблемах</p><p><strong>💳 Оплата:</strong> карты, Tonkeeper, Stars</p><p><strong>📞</strong> Поддержка в тикетах</p></div>`;
    }

    function renderCurrentTab() {
        const container = document.getElementById('content');
        if(currentTab==='catalog') container.innerHTML = renderCatalog();
        else if(currentTab==='profile') container.innerHTML = renderProfile();
        else if(currentTab==='balance') container.innerHTML = renderBalance();
        else if(currentTab==='cart') container.innerHTML = renderCart();
        else if(currentTab==='faq') container.innerHTML = renderFaq();

        if(currentTab==='catalog') {
            const grid = document.getElementById('productsGrid');
            if(grid) {
                grid.innerHTML = products.map(p => `<div class="product-card"><div style="font-size:28px;">${p.emoji}</div><h3>${p.name}</h3><div class="stat-row"><span>💰 Цена</span><span>${p.price} ₽</span></div><button class="add-to-cart" data-id="${p.id}" data-name="${p.name}" data-price="${p.price}">В корзину</button></div>`).join('');
                document.querySelectorAll('.add-to-cart').forEach(btn => btn.addEventListener('click', () => {
                    const id=parseInt(btn.dataset.id), name=btn.dataset.name, price=parseInt(btn.dataset.price);
                    const exist=cart.find(i=>i.id===id);
                    if(exist) exist.qty++; else cart.push({id,name,price,qty:1});
                    if(currentTab==='cart') renderCurrentTab();
                    tg.showPopup({title:"Добавлено", message:`${name} в корзине`, buttons:[{type:"ok"}]});
                }));
                document.querySelectorAll('.category-btn').forEach(btn=>btn.onclick=()=>renderCatalog(btn.dataset.cat));
            }
        }
        if(currentTab==='cart') {
            document.querySelectorAll('.del-cart').forEach(btn=>btn.addEventListener('click',()=>{
                cart = cart.filter(i=>i.id!==parseInt(btn.dataset.id));
                renderCurrentTab();
            }));
            document.getElementById('orderBtn')?.addEventListener('click', async()=>{
                const total=cart.reduce((s,i)=>s+i.price*i.qty,0);
                if(balance>=total) {
                    const resp = await tg.sendData(JSON.stringify({action:'order', items:cart, total}));
                    tg.showPopup({title:"Успех", message:"Заказ оформлен! Товары выданы в бота.", buttons:[{type:"ok"}]});
                    cart=[];
                    await fetchBalance();
                    renderCurrentTab();
                } else tg.showPopup({title:"Ошибка", message:"Недостаточно средств", buttons:[{type:"ok"}]});
            });
        }
        document.getElementById('supportBtn')?.addEventListener('click',()=>window.open('https://t.me/MarketAura_bot?start=support'));
        document.getElementById('rulesBtn')?.addEventListener('click',()=>window.open('https://clearly-first-adamite.tilda.ws/auramarketpravila','_blank'));
        document.getElementById('replenishBtn')?.addEventListener('click',()=>tg.showPopup({title:"Пополнение", message:"Способ скоро появится", buttons:[{type:"ok"}]}));
    }

    document.querySelectorAll('.nav-item').forEach(btn=>btn.addEventListener('click',()=>{
        currentTab=btn.dataset.tab;
        document.querySelectorAll('.nav-item').forEach(b=>b.classList.remove('active'));
        btn.classList.add('active');
        renderCurrentTab();
    }));
    fetchBalance();
</script>
</body>
</html>
