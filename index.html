  <!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>AuraMarket | Mini App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background: radial-gradient(circle at 10% 20%, #0a0a0f, #05050a);
            font-family: 'Montserrat', 'Segoe UI', system-ui, sans-serif;
            color: #fff;
            min-height: 100vh;
            padding-bottom: 90px;
            position: relative;
            overflow-x: hidden;
        }

        /* Анимированный фон */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 50% 50%, rgba(179,0,255,0.15) 0%, rgba(0,0,0,0) 70%);
            z-index: -2;
            pointer-events: none;
        }

        body::after {
            content: '';
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: repeating-linear-gradient(45deg, rgba(179,0,255,0.02) 0px, rgba(179,0,255,0.02) 2px, transparent 2px, transparent 8px);
            z-index: -1;
            pointer-events: none;
            animation: shift 20s linear infinite;
        }

        @keyframes shift {
            0% { transform: translate(0, 0); }
            100% { transform: translate(40px, 40px); }
        }

        /* 3D Логотип */
        .logo-3d {
            width: 70px;
            height: 70px;
            margin: 0 auto 12px;
            background: linear-gradient(135deg, #1a0b2e, #0a0a0f);
            border-radius: 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            box-shadow: 0 0 25px rgba(179,0,255,0.6), inset 0 1px 1px rgba(255,255,255,0.1);
            transform: rotate(0deg);
            transition: transform 0.2s ease;
            animation: floatLogo 3s infinite ease-in-out;
        }

        @keyframes floatLogo {
            0% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-5px) rotate(2deg); }
            100% { transform: translateY(0px) rotate(0deg); }
        }

        .logo-letter {
            font-size: 38px;
            font-weight: 900;
            background: linear-gradient(135deg, #fff, #b300ff, #6a00ff);
            background-size: 200% auto;
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 15px rgba(179,0,255,0.8);
        }

        /* Карточки */
        .glass-card {
            background: rgba(20, 20, 40, 0.6);
            backdrop-filter: blur(15px);
            border-radius: 32px;
            padding: 22px;
            margin: 16px;
            border: 1px solid rgba(179, 0, 255, 0.3);
            transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
        }

        .glass-card:hover {
            border-color: #b300ff;
            transform: translateY(-4px);
            box-shadow: 0 0 25px rgba(179,0,255,0.4);
        }

        /* Кнопки */
        .btn-primary {
            background: linear-gradient(90deg, #b300ff, #6a00ff);
            border: none;
            width: 100%;
            padding: 14px;
            border-radius: 48px;
            font-weight: bold;
            font-size: 16px;
            color: white;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 4px 15px rgba(179,0,255,0.4);
        }

        .btn-primary:active { transform: scale(0.96); }

        /* Список товаров */
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 16px;
            padding: 10px;
        }

        .product-card {
            background: rgba(25, 25, 45, 0.7);
            backdrop-filter: blur(10px);
            border-radius: 28px;
            padding: 16px;
            transition: 0.25s;
            border: 1px solid rgba(179,0,255,0.2);
        }

        .product-card:hover {
            border-color: #b300ff;
            transform: scale(1.02);
            background: rgba(30, 30, 55, 0.8);
        }

        .stat-row {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid rgba(179,0,255,0.2);
        }

        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(8,8,16,0.96);
            backdrop-filter: blur(20px);
            display: flex;
            justify-content: space-around;
            padding: 10px 16px 22px;
            border-top: 1px solid #b300ff;
            z-index: 200;
        }

        .nav-item {
            background: transparent;
            border: none;
            color: #aaa;
            font-size: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
            cursor: pointer;
            transition: 0.2s;
            padding: 6px 12px;
            border-radius: 30px;
        }

        .nav-item.active {
            color: #b300ff;
            text-shadow: 0 0 6px #b300ff;
            background: rgba(179,0,255,0.1);
        }

        .hidden { display: none; }

        .dev-message {
            text-align: center;
            padding: 50px 20px;
        }

        /* Progress bar для уровня */
        .progress-bar {
            background: #2a2a3a;
            border-radius: 20px;
            height: 8px;
            overflow: hidden;
            margin: 10px 0;
        }
        .progress-fill {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #b300ff, #6a00ff);
            border-radius: 20px;
        }
    </style>
</head>
<body>

<div class="glass-card" style="text-align: center;">
    <div class="logo-3d">
        <span class="logo-letter">A</span>
        <span class="logo-letter" style="font-size: 34px;">M</span>
    </div>
    <div style="font-size: 26px; font-weight: 800; letter-spacing: 1px;">AuraMarket</div>
    <div style="font-size: 12px; color: #b300ff;">⚡ где качество встречает технологии</div>
</div>

<div id="content"></div>

<div class="bottom-nav">
    <button class="nav-item" data-tab="catalog"><span>🛍️</span><span>Каталог</span></button>
    <button class="nav-item" data-tab="profile"><span>👤</span><span>Профиль</span></button>
    <button class="nav-item" data-tab="balance"><span>💵</span><span>Баланс</span></button>
    <button class="nav-item" data-tab="cart"><span>🛒</span><span>Корзина</span></button>
    <button class="nav-item" data-tab="info"><span>❓</span><span>FAQ</span></button>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();
    tg.MainButton.hide();
    const user = tg.initDataUnsafe?.user || { id: 0, username: 'user', first_name: 'Гость' };

    // --- Демо-данные (позже будут от бота, но пока шоу) ---
    let balance = 12750;
    let totalOrders = 42;
    let activeOrders = 5;
    let pendingOrders = 2;
    let nextLevelExp = 20000;
    let currentExp = 12750;
    let level = Math.floor(currentExp / 5000) + 1;

    // Каталог
    const products = [
        { id: 1, name: "Telegram Premium 1 мес", price: 129, emoji: "💎", category: "premium" },
        { id: 2, name: "Ключ Windows 11 Pro", price: 149, emoji: "🔑", category: "keys" },
        { id: 3, name: "TikTok USA аккаунт", price: 89, emoji: "📱", category: "accounts" },
        { id: 4, name: "Накрутка TikTok 1000", price: 79, emoji: "📈", category: "boost" },
        { id: 5, name: "ChatGPT Plus", price: 199, emoji: "🤖", category: "premium" },
        { id: 6, name: "Discord Nitro месяц", price: 299, emoji: "🎮", category: "premium" },
        { id: 7, name: "Steam ключ (игра)", price: 99, emoji: "🎲", category: "keys" },
        { id: 8, name: "Instagram 1000 лайков", price: 59, emoji: "❤️", category: "boost" }
    ];
    let cart = [];
    let currentTab = 'catalog';

    // --- UI компоненты ---
    const catalogHTML = () => `
        <div style="padding: 10px;">
            <div style="display: flex; gap: 10px; overflow-x: auto; margin-bottom: 15px; padding: 5px;">
                <button class="category-btn active" data-cat="all">Все</button>
                <button class="category-btn" data-cat="premium">💎 Premium</button>
                <button class="category-btn" data-cat="keys">🔑 Ключи</button>
                <button class="category-btn" data-cat="accounts">👤 Аккаунты</button>
                <button class="category-btn" data-cat="boost">📈 Накрутка</button>
            </div>
            <div class="products-grid" id="productsGrid"></div>
        </div>
    `;

    const profileHTML = () => `
        <div class="glass-card">
            <div style="text-align:center">
                <span style="font-size: 72px;">👑</span>
                <h2>${user.first_name}</h2>
                <div style="color: #b300ff;">@{username}</div>
                <div class="level-badge" style="margin-top: 8px;">🟣 Уровень ${level}</div>
                <div class="progress-bar"><div class="progress-fill" style="width: ${(currentExp/nextLevelExp)*100}%;"></div></div>
                <div style="font-size: 12px;">${currentExp} / ${nextLevelExp} опыта</div>
            </div>
            <div class="stat-row"><span>💰 Баланс</span><span>${balance} ₽</span></div>
            <div class="stat-row"><span>📦 Всего заказов</span><span>${totalOrders}</span></div>
            <button class="btn-primary" id="supportBtn">📞 Техподдержка</button>
            <button class="btn-primary" id="rulesBtn">📝 Правила</button>
        </div>
    `;

    const balanceHTML = () => `
        <div class="glass-card">
            <div class="stat-row"><span>💰 Баланс</span><span>${balance} ₽</span></div>
            <div class="stat-row"><span>📦 Всего заказов</span><span>${totalOrders}</span></div>
            <div class="stat-row"><span>⚙️ Активных заказов</span><span>${activeOrders}</span></div>
            <div class="stat-row"><span>⏳ Заказов на обработке</span><span>${pendingOrders}</span></div>
            <button class="btn-primary" id="replenishBtn">💸 Пополнить баланс</button>
            <div style="text-align:center; margin-top:12px; font-size:12px;">✨ Telegram Stars, карты, крипта</div>
        </div>
    `;

    const cartHTML = () => {
        if (cart.length === 0) return `<div class="dev-message"><h3>🛒 Корзина пуста</h3><p>Добавьте товары из каталога</p></div>`;
        let total = cart.reduce((s,i) => s + i.price * i.qty, 0);
        return `
            <div class="glass-card">
                ${cart.map(item => `<div class="stat-row"><span>${item.name} x${item.qty}</span><span>${item.price * item.qty} ₽</span><button class="del-cart" data-id="${item.id}">❌</button></div>`).join('')}
                <div class="stat-row"><strong>Итого</strong><strong>${total} ₽</strong></div>
                <button class="btn-primary" id="orderBtn">Оформить заказ</button>
            </div>
        `;
    };

    const faqHTML = () => `
        <div class="glass-card">
            <h3>🔍 Частые вопросы</h3>
            <p><strong>⚡ Мгновенная выдача</strong> — данные приходят сразу после оплаты</p>
            <p><strong>🛡 Гарантия 30 дней</strong> — замена при проблемах</p>
            <p><strong>💳 Оплата:</strong> карты, Tonkeeper, Stars</p>
            <p><strong>📞</strong> Поддержка в тикетах</p>
        </div>
    `;

    function renderCategory(activeCat='all') {
        let filtered = products;
        if(activeCat !== 'all') filtered = products.filter(p => p.category === activeCat);
        const grid = document.getElementById('productsGrid');
        if(grid) grid.innerHTML = filtered.map(p => `
            <div class="product-card">
                <div style="font-size: 32px;">${p.emoji}</div>
                <h3>${p.name}</h3>
                <div class="stat-row"><span>💰 Цена</span><span>${p.price} ₽</span></div>
                <button class="btn-primary add-to-cart" data-id="${p.id}" data-name="${p.name}" data-price="${p.price}">В корзину</button>
            </div>
        `).join('');
        document.querySelectorAll('.add-to-cart').forEach(btn => btn.addEventListener('click', (e) => {
            const id = parseInt(btn.dataset.id);
            const name = btn.dataset.name;
            const price = parseInt(btn.dataset.price);
            const exist = cart.find(i => i.id === id);
            if(exist) exist.qty++;
            else cart.push({ id, name, price, qty: 1 });
            if(currentTab === 'cart') renderCurrentTab();
            tg.showPopup({ title: 'Добавлено', message: `${name} в корзине`, buttons: [{type:'ok'}] });
        }));
        document.querySelectorAll('.category-btn').forEach(btn => {
            btn.classList.remove('active');
            if(btn.dataset.cat === activeCat) btn.classList.add('active');
            btn.onclick = () => renderCategory(btn.dataset.cat);
        });
    }

    function renderCurrentTab() {
        const container = document.getElementById('content');
        if(currentTab === 'catalog') container.innerHTML = catalogHTML();
        else if(currentTab === 'profile') container.innerHTML = profileHTML();
        else if(currentTab === 'balance') container.innerHTML = balanceHTML();
        else if(currentTab === 'cart') container.innerHTML = cartHTML();
        else if(currentTab === 'info') container.innerHTML = faqHTML();

        if(currentTab === 'catalog') renderCategory();
        if(currentTab === 'cart') {
            document.querySelectorAll('.del-cart').forEach(btn => btn.addEventListener('click', (e) => {
                const id = parseInt(btn.dataset.id);
                cart = cart.filter(i => i.id !== id);
                renderCurrentTab();
            }));
            document.getElementById('orderBtn')?.addEventListener('click', () => {
                const total = cart.reduce((s,i) => s + i.price * i.qty, 0);
                if(balance >= total) {
                    balance -= total;
                    totalOrders++;
                    activeOrders++;
                    tg.sendData(JSON.stringify({ action: 'order', items: cart, total }));
                    tg.showPopup({ title: 'Успех', message: 'Заказ оформлен! Товары выданы.', buttons:[{type:'ok'}] });
                    cart = [];
                    renderCurrentTab();
                } else {
                    tg.showPopup({ title: 'Ошибка', message: 'Недостаточно средств', buttons:[{type:'ok'}] });
                }
            });
        }
        document.getElementById('supportBtn')?.addEventListener('click', () => window.location.href = 'https://t.me/MarketAura_bot?start=support');
        document.getElementById('rulesBtn')?.addEventListener('click', () => window.open('https://clearly-first-adamite.tilda.ws/auramarketpravila', '_blank'));
        document.getElementById('replenishBtn')?.addEventListener('click', () => tg.showPopup({ title: 'Пополнение', message: 'Способ скоро появится', buttons:[{type:'ok'}] }));
    }

    // Навигация
    document.querySelectorAll('.nav-item').forEach(btn => {
        btn.addEventListener('click', (e) => {
            currentTab = btn.dataset.tab;
            document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            renderCurrentTab();
        });
    });
    renderCurrentTab();
</script>
</body>
</html>
