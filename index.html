<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>AuraMarket | Каталог</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: radial-gradient(circle at 20% 30%, #0a0a0f, #030308);
            font-family: 'Montserrat', system-ui;
            color: white;
            padding: 20px;
            padding-bottom: 30px;
        }
        .card {
            background: rgba(20,20,40,0.65);
            backdrop-filter: blur(16px);
            border-radius: 28px;
            padding: 20px;
            margin: 12px 0;
            border: 1px solid rgba(179,0,255,0.35);
        }
        .price {
            color: #b300ff;
            font-size: 20px;
            font-weight: bold;
        }
        .category {
            font-size: 12px;
            color: #aaa;
            margin-top: 5px;
        }
        .empty {
            text-align: center;
            padding: 40px;
            color: #aaa;
        }
        .logo {
            text-align: center;
            margin-bottom: 20px;
        }
        .logo span {
            font-size: 42px;
            font-weight: 900;
            background: linear-gradient(145deg, #fff, #b300ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
    </style>
</head>
<body>
    <div class="logo">
        <span>AuraMarket</span>
        <div style="font-size:12px; color:#b300ff;">Каталог товаров</div>
    </div>
    
    <div id="products">Загрузка...</div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        
        async function sendRequest(action, data = {}) {
            data.action = action;
            const response = await tg.sendData(JSON.stringify(data));
            try {
                return JSON.parse(response);
            } catch(e) {
                return {};
            }
        }
        
        async function loadProducts() {
            const result = await sendRequest('get_products');
            const productsDiv = document.getElementById('products');
            
            if (result.products && result.products.length > 0) {
                productsDiv.innerHTML = result.products.map(p => `
                    <div class="card">
                        <div style="font-size:18px; font-weight:bold;">${p.name}</div>
                        <div class="price">💰 ${p.price} ₽</div>
                        <div class="category">📁 ${p.category}</div>
                        <div style="font-size:12px; margin-top:8px;">${p.description ? p.description.substring(0, 80) : ''}</div>
                    </div>
                `).join('');
            } else {
                productsDiv.innerHTML = '<div class="empty">❌ Нет товаров в каталоге<br><br>Добавьте товары через админ-панель бота</div>';
            }
        }
        
        loadProducts();
    </script>
</body>
</html>
