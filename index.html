<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>AuraMarket | Магазин</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: radial-gradient(circle at 20% 30%, #0a0a0f, #030308);
            font-family: 'Montserrat', system-ui;
            color: white;
            min-height: 100vh;
            padding-bottom: 80px;
        }
        .glass-card {
            background: rgba(20,20,40,0.65);
            backdrop-filter: blur(16px);
            border-radius: 32px;
            padding: 20px;
            margin: 16px;
            border: 1px solid rgba(179,0,255,0.35);
        }
        .btn-primary {
            background: linear-gradient(90deg, #b300ff, #6a00ff);
            border: none;
            width: 100%;
            padding: 14px;
            border-radius: 60px;
            font-weight: bold;
            color: white;
            cursor: pointer;
            margin: 5px 0;
        }
        .btn-secondary {
            background: #2a2a3a;
            border: 1px solid rgba(179,0,255,0.3);
        }
        .payment-methods {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin: 15px 0;
        }
        .payment-item {
            background: rgba(25,25,50,0.7);
            border-radius: 24px;
            padding: 15px;
            cursor: pointer;
            transition: 0.2s;
            border: 1px solid rgba(179,0,255,0.3);
        }
        .payment-item:hover {
            border-color: #b300ff;
            transform: translateX(5px);
        }
        .payment-item.selected {
            background: rgba(179,0,255,0.2);
            border-color: #b300ff;
        }
        .amount-input {
            width: 100%;
            padding: 14px;
            background: #1a1a2e;
            border: 1px solid #b300ff;
            border-radius: 24px;
            color: white;
            font-size: 18px;
            text-align: center;
            margin: 15px 0;
        }
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 16px;
            padding: 10px;
        }
        .product-card {
            background: rgba(25,25,50,0.7);
            border-radius: 28px;
            padding: 16px;
            border: 1px solid rgba(179,0,255,0.25);
            cursor: pointer;
            transition: 0.2s;
        }
        .product-card:hover {
            border-color: #b300ff;
            transform: translateY(-2px);
        }
        .stat-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid rgba(179,0,255,0.2); }
        .bottom-nav {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: rgba(8,8,16,0.96); backdrop-filter: blur(20px);
            display: flex; justify-content: space-around; padding: 8px 16px 22px;
            border-top: 1px solid #b300ff;
        }
        .nav-item {
            background: transparent; border: none; color: #aaa; font-size: 12px;
            display: flex; flex-direction: column; align-items: center; gap: 4px;
            cursor: pointer; padding: 6px 12px; border-radius: 40px;
        }
        .nav-item.active { color: #b300ff; background: rgba(179,0,255,0.15); }
        .logo {
            text-align: center;
            margin-bottom: 10px;
        }
        .logo-letters {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 0;
        }
        .logo-letter {
            font-size: 48px;
            font-weight: 900;
            background: linear-gradient(145deg, #fff, #b300ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -5px;
        }
        .logo-sub {
            font-size: 12px;
            color: #b300ff;
            margin-top: -8px;
        }
        .price {
            color: #b300ff;
            font-weight: bold;
            font-size: 18px;
        }
        .category-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
            padding-bottom: 8px;
            border-bottom: 1px solid rgba(179,0,255,0.3);
        }
        .category-icon { font-size: 32px; }
        .category-title { font-size: 22px; font-weight: bold; }
        .subcategory-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 20px;
        }
        .subcategory-btn {
            background: rgba(179,0,255,0.2);
            border-radius: 30px;
            padding: 8px 20px;
            font-size: 14px;
            cursor: pointer;
            transition: 0.2s;
        }
        .subcategory-btn.active { background: #b300ff; }
        .back-btn {
            background: #2a2a3a;
            border: none;
            padding: 10px 20px;
            border-radius: 30px;
            color: white;
            cursor: pointer;
            margin-bottom: 16px;
            display: inline-block;
        }
        .product-detail {
            background: rgba(25,25,50,0.9);
            border-radius: 28px;
            padding: 20px;
        }
        .product-detail h2 { margin-bottom: 12px; }
        .product-detail .price { font-size: 28px; margin: 16px 0; }
        .product-detail .description { color: #ccc; line-height: 1.5; margin: 16px 0; }
        .link-item {
            background: rgba(179,0,255,0.1);
            border-radius: 16px;
            padding: 12px;
            margin: 8px 0;
            word-break: break-all;
        }
        .link-item a { color: #b300ff; text-decoration: none; }
        .empty-stock { text-align: center; padding: 40px; color: #aaa; }
        .chat-messages { max-height: 400px; overflow-y: auto; margin-bottom: 12px; padding-right: 8px; }
        .chat-message { background: rgba(179,0,255,0.1); border-radius: 16px; padding: 10px; margin-bottom: 8px; }
        .chat-message strong { color: #b300ff; }
        .chat-input-area { display: flex; gap: 8px; margin-top: 12px; }
        .chat-input { flex: 1; padding: 12px; background: #1a1a2e; border: 1px solid #b300ff; border-radius: 24px; color: white; }
        .chat-send { background: #b300ff; border: none; border-radius: 24px; padding: 0 18px; color: white; font-weight: bold; cursor: pointer; }
        .modal-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.85); backdrop-filter: blur(8px);
            display: flex; align-items: center; justify-content: center; z-index: 1000;
        }
        .modal-content {
            background: #1a1a2e; border-radius: 32px; padding: 24px;
            width: 90%; max-width: 400px; border: 1px solid #b300ff;
            max-height: 80vh; overflow-y: auto;
        }
        .modal-input {
            width: 100%; padding: 14px; background: #0a0a0f;
            border: 1px solid #b300ff; border-radius: 24px; color: white; margin: 16px 0;
        }
        .modal-buttons { display: flex; gap: 12px; margin-top: 15px; }
        .modal-btn { flex: 1; padding: 12px; border-radius: 40px; font-weight: bold; cursor: pointer; text-align: center; }
        .modal-btn-confirm { background: linear-gradient(90deg, #b300ff, #6a00ff); color: white; }
        .modal-btn-cancel { background: #2a2a3a; color: #aaa; }
        .hidden { display: none; }
        .invoice-info {
            background: rgba(0,0,0,0.3);
            border-radius: 20px;
            padding: 15px;
            margin: 15px 0;
            text-align: center;
        }
        .invoice-info p { margin: 8px 0; }
        .copy-btn {
            background: #b300ff;
            border: none;
            padding: 8px 15px;
            border-radius: 20px;
            color: white;
            cursor: pointer;
            margin-top: 10px;
        }
    </style>
</head>
<body>

<div class="glass-card" style="text-align:center; padding-bottom: 15px;">
    <div class="logo">
        <div class="logo-letters">
            <span class="logo-letter">A</span><span class="logo-letter" style="margin-left:-8px;">M</span>
        </div>
        <div class="logo-sub">🚀 Ваш выбор в сфере цифровых товаров</div>
    </div>
</div>

<div id="content"></div>

<div class="bottom-nav">
    <button class="nav-item" data-tab="catalog"><span>🛍️</span><span>Каталог</span></button>
    <button class="nav-item" data-tab="profile"><span>👤</span><span>Профиль</span></button>
    <button class="nav-item" data-tab="cart"><span>🛒</span><span>Корзина</span></button>
    <button class="nav-item" data-tab="faq"><span>❓</span><span>FAQ</span></button>
    <button class="nav-item" data-tab="chat"><span>👥</span><span>Чат</span></button>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();
    const user = tg.initDataUnsafe?.user || { id: 0, username: 'user', first_name: 'Гость' };
    
    let balance = 0;
    let totalOrders = 0;
    let activeOrders = 0;
    let pendingOrders = 0;
    let promoCount = 0;
    let cart = [];
    let currentTab = 'catalog';
    let chatMessages = [];
    
    let catalogView = 'main';
    let currentCategory = null;
    let currentSubcategory = null;
    let currentProduct = null;
    
    // ==================== СТРУКТУРА ТОВАРОВ ====================
    const categories = {
        "Steam": { icon: "🎮", products: [{ id: "steam_1", name: "Steam | Новорег | Чистый", price: 9, type: "account", description: "- Чистый аккаунт, без блокировок.\n- Полный комплект: почта и пароль.\n- Доступность смены почты и пароля, для безопасности советуем вам поставить 2FA защиту.\n> Гарантия на аккаунт первые 3 дня.\n\nСпешим напомнить! Срок жизни аккаунта зависит от ваших действий и правил сервиса. Мы не несем ответственности за блокировки, вызванные нарушением правил платформы после входа в аккаунт, гарантии подлежит только технические проблемы." }] },
        "Telegram": { icon: "📱", subcategories: ["Аккаунты", "Накрутка", "Гайды/Мануалы"], products: { "Аккаунты": [{ id: "tg_us", name: "Чистый аккаунт, авторег | США", price: 99, type: "account", description: "Советы при входе..." }], "Накрутка": [{ id: "tg_boost", name: "Накрутка Telegram", price: 0, type: "empty", description: "❌ Нет в наличии" }], "Гайды/Мануалы": [{ id: "tg_guides", name: "Гайды Telegram", price: 0, type: "empty", description: "❌ Нет в наличии" }] } },
        "GTA V": { icon: "🏎️", subcategories: ["Steam", "Epic Games", "Rockstar Games"], products: { "Steam": [{ id: "gta_legasy", name: "GTA V | Legasy", price: 1429, type: "account", description: "- Чистый аккаунт, без блокировок..." }], "Epic Games": [{ id: "gta_epic_empty", name: "Нет в наличии", price: 0, type: "empty", description: "❌ Товары появятся скоро" }], "Rockstar Games": [{ id: "gta_rockstar_empty", name: "Нет в наличии", price: 0, type: "empty", description: "❌ Товары появятся скоро" }] } },
        "TikTok": { icon: "📱", subcategories: ["Аккаунты", "Накрутка"], products: { "Аккаунты": [{ id: "tt_de", name: "Чистый аккаунт, авторег | Германия", price: 19, type: "account", description: "- Чистый аккаунт..." }], "Накрутка": [{ id: "tt_boost", name: "Накрутка TikTok", price: 0, type: "empty", description: "❌ Нет в наличии" }] } },
        "Counter-Strike 2": { icon: "🎯", subcategories: ["Аккаунты", "Гайды"], products: { "Аккаунты": [{ id: "cs2_prime", name: "Counter-Strike | Prime", price: 1249, type: "account", description: "- Чистый аккаунт..." }], "Гайды": [{ id: "cs2_guide1", name: "ПАК КОНФИГОВ", price: 9, type: "link", url: "https://disk.yandex.ru/d/tLSGBEqsYlrHnw", description: "Пак конфигов" }] } },
        "Rust": { icon: "🦀", subcategories: ["Аккаунты", "Гайды"], products: { "Аккаунты": [{ id: "rust_clean", name: "Rust | Чистый", price: 929, type: "account", description: "- Чистый аккаунт..." }], "Гайды": [{ id: "rust_guide1", name: "ЛУЧШИЕ ФИШКИ И СЕКРЕТЫ", price: 9, type: "link", url: "https://disk.yandex.ru/i/wqz_iuHy68haYA", description: "Полезные фишки" }] } },
        "Dota 2": { icon: "⚔️", subcategories: ["Аккаунты", "Гайды"], products: { "Аккаунты": [{ id: "dota_new", name: "Чистый аккаунт, новорег", price: 29, type: "account", description: "- Чистый аккаунт..." }], "Гайды": [{ id: "dota_guide1", name: "КОМАНДЫ ДЛЯ ПАРАМЕТРА ЗАПУСКА", price: 9, type: "link", url: "https://docs.google.com/document/d/1Y4gVupNqRaSA2I1Saimh509sins4kZXsE2MgtqtkFio/edit?usp=sharing", description: "Команды для запуска" }] } },
        "Discord": { icon: "🎙️", subcategories: ["Аккаунты", "Nitro"], products: { "Аккаунты": [{ id: "discord_uk", name: "Чистый аккаунт, новорег | Англия", price: 29, type: "account", description: "- Чистый аккаунт..." }], "Nitro": [{ id: "discord_nitro", name: "Discord | Nitro trial | 1 месяц", price: 99, type: "account", description: "- Чистый аккаунт..." }] } },
        "Сигны": { icon: "💰", products: [{ id: "signals_empty", name: "Нет в наличии", price: 0, type: "empty", description: "❌ Товары появятся скоро" }] },
        "Supercell": { icon: "🏰", products: [{ id: "supercell_empty", name: "Нет в наличии", price: 0, type: "empty", description: "❌ Товары появятся скоро" }] },
        "Roblox": { icon: "🧸", products: [{ id: "roblox_empty", name: "Нет в наличии", price: 0, type: "empty", description: "❌ Товары появятся скоро" }] },
        "Chat-GPT": { icon: "🤖", products: [{ id: "chatgpt_empty", name: "Нет в наличии", price: 0, type: "empty", description: "❌ Товары появятся скоро" }] },
        "Minecraft": { icon: "⛏️", products: [{ id: "minecraft_empty", name: "Нет в наличии", price: 0, type: "empty", description: "❌ Товары появятся скоро" }] },
        "YouTube": { icon: "📺", products: [{ id: "youtube_empty", name: "Нет в наличии", price: 0, type: "empty", description: "❌ Товары появятся скоро" }] }
    };
    
    const categoryList = ["Steam", "Telegram", "GTA V", "TikTok", "Counter-Strike 2", "Rust", "Dota 2", "Discord", "Сигны", "Supercell", "Roblox", "Chat-GPT", "Minecraft", "YouTube"];
    
    // ==================== ФУНКЦИИ ====================
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    
    function addToCart(product) {
        if (product.type === 'empty') return;
        const exist = cart.find(i => i.id === product.id);
        if (exist) exist.qty++;
        else cart.push({...product, qty: 1});
        tg.showPopup({title: "Добавлено", message: `${product.name} в корзине`, buttons:[{type:"ok"}]});
        if (currentTab === 'cart') renderCurrentTab();
    }
    
    async function sendRequest(action, data = {}) {
        data.action = action;
        try {
            const response = await tg.sendData(JSON.stringify(data));
            console.log("📥 Ответ:", response);
            return JSON.parse(response);
        } catch(e) {
            console.error("Ошибка:", e);
            return {};
        }
    }
    
    async function loadUserData() {
        const data = await sendRequest('get_data');
        balance = data.balance || 0;
        totalOrders = data.total_orders || 0;
        pendingOrders = data.pending_orders || 0;
    }
    
    function saveToStorage() {
        localStorage.setItem('auramarket_chat', JSON.stringify(chatMessages));
        localStorage.setItem('auramarket_balance', balance);
        localStorage.setItem('auramarket_orders', totalOrders);
        localStorage.setItem('auramarket_promo_count', promoCount);
    }
    
    // ==================== ПОПОЛНЕНИЕ БАЛАНСА ====================
    let currentInvoice = null;
    
    async function showReplenishModal() {
        let selectedMethod = 'stars';
        let amount = 100;
        
        const modal = document.createElement('div');
        modal.className = 'modal-overlay';
        modal.innerHTML = `
            <div class="modal-content">
                <h3 style="text-align:center;">💸 Пополнение баланса</h3>
                <div class="payment-methods" id="paymentMethods">
                    <div class="payment-item selected" data-method="stars">💎 Telegram Stars</div>
                    <div class="payment-item" data-method="send">💰 @send (криптобот)</div>
                    <div class="payment-item" data-method="ton">💎 TON</div>
                    <div class="payment-item" data-method="card">💳 Банковские карты РФ (в разработке)</div>
                </div>
                <input type="number" id="amountInput" class="amount-input" value="100" min="10" step="10" placeholder="Сумма в ₽">
                <div id="methodInfo" class="invoice-info" style="display:none;"></div>
                <div class="modal-buttons">
                    <div class="modal-btn modal-btn-cancel" id="cancelBtn">❌ Отмена</div>
                    <div class="modal-btn modal-btn-confirm" id="confirmBtn">💸 Пополнить</div>
                </div>
            </div>
        `;
        document.body.appendChild(modal);
        
        const paymentItems = modal.querySelectorAll('.payment-item');
        paymentItems.forEach(item => {
            item.onclick = () => {
                paymentItems.forEach(i => i.classList.remove('selected'));
                item.classList.add('selected');
                selectedMethod = item.dataset.method;
                updateMethodInfo(selectedMethod, amount);
            };
        });
        
        const amountInput = modal.querySelector('#amountInput');
        amountInput.onchange = () => {
            amount = parseInt(amountInput.value) || 10;
            if (amount < 10) amount = 10;
            amountInput.value = amount;
            updateMethodInfo(selectedMethod, amount);
        };
        
        function updateMethodInfo(method, amt) {
            const infoDiv = modal.querySelector('#methodInfo');
            if (method === 'card') {
                infoDiv.style.display = 'block';
                infoDiv.innerHTML = '<p style="color:#ffaa00;">🔨 Технические работы. Способ временно недоступен.</p>';
            } else {
                infoDiv.style.display = 'none';
            }
        }
        
        modal.querySelector('#confirmBtn').onclick = async () => {
            amount = parseInt(amountInput.value) || 10;
            if (amount < 10) {
                tg.showPopup({title: "Ошибка", message: "Минимальная сумма 10₽", buttons:[{type:"ok"}]});
                return;
            }
            if (selectedMethod === 'card') {
                tg.showPopup({title: "Ошибка", message: "Способ оплаты на технических работах", buttons:[{type:"ok"}]});
                return;
            }
            modal.remove();
            const result = await sendRequest('create_invoice', {amount: amount, method: selectedMethod});
            if (result.success) {
                if (result.method === 'stars') {
                    tg.showPopup({title: "💎 Telegram Stars", message: `Оплатите ${amount} Stars. После оплаты баланс пополнится автоматически.`, buttons:[{type:"ok"}]});
                    await sendRequest('confirm_payment', {invoice_id: result.invoice_id});
                    await loadUserData();
                    if (currentTab === 'profile') renderCurrentTab();
                } else if (result.method === 'send') {
                    const confirmModal = document.createElement('div');
                    confirmModal.className = 'modal-overlay';
                    confirmModal.innerHTML = `
                        <div class="modal-content">
                            <h3 style="text-align:center;">💰 Оплата через @send</h3>
                            <div class="invoice-info">
                                <p><strong>Сумма:</strong> ${amount} ₽</p>
                                <p><strong>Кошелёк:</strong> <span id="walletAddr">${result.wallet}</span></p>
                                <p><strong>Комментарий:</strong> <span id="commentId">${result.invoice_id}</span></p>
                                <button class="copy-btn" id="copyWallet">📋 Копировать кошелёк</button>
                                <button class="copy-btn" id="copyComment">📋 Копировать комментарий</button>
                            </div>
                            <div class="modal-buttons">
                                <div class="modal-btn modal-btn-cancel" id="closeConfirm">❌ Закрыть</div>
                                <div class="modal-btn modal-btn-confirm" id="paidConfirm">✅ Я оплатил</div>
                            </div>
                        </div>
                    `;
                    document.body.appendChild(confirmModal);
                    
                    confirmModal.querySelector('#copyWallet').onclick = () => {
                        navigator.clipboard.writeText(result.wallet);
                        tg.showPopup({title: "Скопировано", message: "Кошелёк скопирован", buttons:[{type:"ok"}]});
                    };
                    confirmModal.querySelector('#copyComment').onclick = () => {
                        navigator.clipboard.writeText(result.invoice_id);
                        tg.showPopup({title: "Скопировано", message: "Комментарий скопирован", buttons:[{type:"ok"}]});
                    };
                    confirmModal.querySelector('#closeConfirm').onclick = () => confirmModal.remove();
                    confirmModal.querySelector('#paidConfirm').onclick = async () => {
                        confirmModal.remove();
                        const paidResult = await sendRequest('confirm_payment', {invoice_id: result.invoice_id});
                        if (paidResult.success) {
                            balance = paidResult.new_balance;
                            tg.showPopup({title: "✅ Успех", message: paidResult.message, buttons:[{type:"ok"}]});
                            if (currentTab === 'profile') renderCurrentTab();
                        } else {
                            tg.showPopup({title: "❌ Ошибка", message: paidResult.error || "Платеж не найден", buttons:[{type:"ok"}]});
                        }
                    };
                } else if (result.method === 'ton') {
                    const confirmModal = document.createElement('div');
                    confirmModal.className = 'modal-overlay';
                    confirmModal.innerHTML = `
                        <div class="modal-content">
                            <h3 style="text-align:center;">💎 Оплата в TON</h3>
                            <div class="invoice-info">
                                <p><strong>Сумма:</strong> ${amount} ₽ (~${(amount/200).toFixed(2)} TON)</p>
                                <p><strong>Кошелёк:</strong> <span id="walletAddr">${result.wallet}</span></p>
                                <p><strong>Комментарий:</strong> <span id="commentId">${result.invoice_id}</span></p>
                                <button class="copy-btn" id="copyWallet">📋 Копировать кошелёк</button>
                                <button class="copy-btn" id="copyComment">📋 Копировать комментарий</button>
                            </div>
                            <div class="modal-buttons">
                                <div class="modal-btn modal-btn-cancel" id="closeConfirm">❌ Закрыть</div>
                                <div class="modal-btn modal-btn-confirm" id="paidConfirm">✅ Я оплатил</div>
                            </div>
                        </div>
                    `;
                    document.body.appendChild(confirmModal);
                    confirmModal.querySelector('#copyWallet').onclick = () => {
                        navigator.clipboard.writeText(result.wallet);
                        tg.showPopup({title: "Скопировано", message: "Кошелёк скопирован", buttons:[{type:"ok"}]});
                    };
                    confirmModal.querySelector('#copyComment').onclick = () => {
                        navigator.clipboard.writeText(result.invoice_id);
                        tg.showPopup({title: "Скопировано", message: "Комментарий скопирован", buttons:[{type:"ok"}]});
                    };
                    confirmModal.querySelector('#closeConfirm').onclick = () => confirmModal.remove();
                    confirmModal.querySelector('#paidConfirm').onclick = async () => {
                        confirmModal.remove();
                        const paidResult = await sendRequest('confirm_payment', {invoice_id: result.invoice_id});
                        if (paidResult.success) {
                            balance = paidResult.new_balance;
                            tg.showPopup({title: "✅ Успех", message: paidResult.message, buttons:[{type:"ok"}]});
                            if (currentTab === 'profile') renderCurrentTab();
                        } else {
                            tg.showPopup({title: "❌ Ошибка", message: paidResult.error || "Платеж не найден", buttons:[{type:"ok"}]});
                        }
                    };
                }
            } else {
                tg.showPopup({title: "Ошибка", message: result.error || "Не удалось создать счёт", buttons:[{type:"ok"}]});
            }
        };
        modal.querySelector('#cancelBtn').onclick = () => modal.remove();
    }
    
    // ==================== НАВИГАЦИЯ ====================
    window.openCategory = function(catName) {
        catalogView = 'category';
        currentCategory = catName;
        renderCurrentTab();
    };
    
    window.openSubcategory = function(subName) {
        catalogView = 'subcategory';
        currentSubcategory = subName;
        renderCurrentTab();
    };
    
    window.openProduct = function(productId, catName, subName) {
        let product = null;
        const cat = categories[catName];
        if (subName && cat.subcategories) {
            product = cat.products[subName].find(p => p.id === productId);
        } else if (cat.products) {
            product = cat.products.find(p => p.id === productId);
        }
        if (product) {
            currentProduct = product;
            catalogView = 'product';
            renderCurrentTab();
        }
    };
    
    window.openLinkProduct = function(product) {
        tg.openLink(product.url);
    };
    
    window.goBack = function() {
        if (catalogView === 'product') {
            if (currentSubcategory) catalogView = 'subcategory';
            else catalogView = 'category';
            currentProduct = null;
            renderCurrentTab();
        } else if (catalogView === 'subcategory') {
            catalogView = 'category';
            currentSubcategory = null;
            renderCurrentTab();
        } else if (catalogView === 'category') {
            catalogView = 'main';
            currentCategory = null;
            renderCurrentTab();
        }
    };
    
    // ==================== ОТРИСОВКА ====================
    function renderMainCatalog() {
        let html = '<div class="products-grid">';
        for (let catName of categoryList) {
            const cat = categories[catName];
            html += `<div class="product-card" onclick="openCategory('${catName}')">
                        <div style="font-size: 40px;">${cat.icon}</div>
                        <div style="font-size: 18px; font-weight: bold; margin-top: 8px;">${catName}</div>
                    </div>`;
        }
        html += '</div>';
        return html;
    }
    
    function renderCategoryView() {
        const cat = categories[currentCategory];
        if (!cat) return '<div class="empty-stock">Категория не найдена</div>';
        if (cat.subcategories) {
            let html = `<button class="back-btn" onclick="goBack()">← Назад</button>`;
            html += `<div class="category-header"><span class="category-icon">${cat.icon}</span><span class="category-title">${currentCategory}</span></div>`;
            html += `<div class="subcategory-grid">`;
            for (let sub of cat.subcategories) {
                html += `<div class="subcategory-btn" onclick="openSubcategory('${sub}')">${sub}</div>`;
            }
            html += `</div>`;
            return html;
        } else {
            let productsList = cat.products;
            let html = `<button class="back-btn" onclick="goBack()">← Назад</button>`;
            html += `<div class="category-header"><span class="category-icon">${cat.icon}</span><span class="category-title">${currentCategory}</span></div>`;
            html += `<div class="products-grid">`;
            for (let p of productsList) {
                if (p.type === 'empty') {
                    html += `<div class="product-card" style="opacity:0.7;"><div>📦</div><strong>${p.name}</strong><div class="price">Нет в наличии</div></div>`;
                } else {
                    html += `<div class="product-card" onclick="openProduct('${p.id}', '${currentCategory}', null)"><div>🎮</div><strong>${p.name}</strong><div class="price">${p.price} ₽</div></div>`;
                }
            }
            html += `</div>`;
            return html;
        }
    }
    
    function renderSubcategoryView() {
        const cat = categories[currentCategory];
        const productsList = cat.products[currentSubcategory];
        if (!productsList) return '<div class="empty-stock">Нет товаров</div>';
        let html = `<button class="back-btn" onclick="goBack()">← Назад</button>`;
        html += `<div class="category-header"><span class="category-icon">${cat.icon}</span><span class="category-title">${currentCategory} / ${currentSubcategory}</span></div>`;
        html += `<div class="products-grid">`;
        for (let p of productsList) {
            if (p.type === 'empty') {
                html += `<div class="product-card" style="opacity:0.7;"><div>📦</div><strong>${p.name}</strong><div class="price">Нет в наличии</div></div>`;
            } else if (p.type === 'link') {
                html += `<div class="product-card" onclick="openLinkProduct(${JSON.stringify(p).replace(/"/g, '&quot;')})"><div>📘</div><strong>${p.name}</strong><div class="price">${p.price} ₽</div></div>`;
            } else {
                html += `<div class="product-card" onclick="openProduct('${p.id}', '${currentCategory}', '${currentSubcategory}')"><div>🎮</div><strong>${p.name}</strong><div class="price">${p.price} ₽</div></div>`;
            }
        }
        html += `</div>`;
        return html;
    }
    
    function renderProductView() {
        let html = `<button class="back-btn" onclick="goBack()">← Назад</button>`;
        html += `<div class="product-detail">`;
        html += `<h2>${escapeHtml(currentProduct.name)}</h2>`;
        html += `<div class="price">${currentProduct.price} ₽</div>`;
        html += `<div class="description">${escapeHtml(currentProduct.description).replace(/\n/g, '<br>')}</div>`;
        if (currentProduct.type === 'link') {
            html += `<div class="link-item"><a href="${currentProduct.url}" target="_blank">🔗 Ссылка на товар</a></div>`;
            html += `<button class="btn-primary" onclick="openLinkProduct(currentProduct)">🔗 Открыть ссылку</button>`;
        } else {
            html += `<button class="btn-primary" onclick="addToCart(currentProduct)">🛒 Добавить в корзину</button>`;
        }
        html += `</div>`;
        return html;
    }
    
    function renderCatalog() {
        if (catalogView === 'main') return renderMainCatalog();
        else if (catalogView === 'category') return renderCategoryView();
        else if (catalogView === 'subcategory') return renderSubcategoryView();
        else if (catalogView === 'product') return renderProductView();
        return '<div class="empty-stock">Ошибка</div>';
    }
    
    function renderProfile() {
        return `
            <div class="glass-card" style="text-align:center;">
                <div style="font-size:56px;">👤</div>
                <h2>${escapeHtml(user.first_name)}</h2>
                <div style="color:#aaa; margin-bottom:15px;">@${user.username || 'user'}</div>
                <div class="stat-row"><span>💰 Баланс</span><span class="price">${balance} ₽</span></div>
                <div class="stat-row"><span>📦 Всего заказов</span><span>${totalOrders}</span></div>
                <div class="stat-row"><span>|— Активных</span><span>${activeOrders}</span></div>
                <div class="stat-row"><span>|— На обработке</span><span>${pendingOrders}</span></div>
                <div class="stat-row"><span>💎 Активировано промокодов</span><span>${promoCount}</span></div>
                <button class="btn-primary" id="replenishBtn">💸 Пополнить баланс</button>
                <button class="btn-primary btn-secondary" id="activatePromoBtn">💎 Активировать промокод</button>
            </div>
        `;
    }
    
    function renderCart() {
        if (cart.length === 0) return `<div class="glass-card" style="text-align:center">🛒 Корзина пуста</div>`;
        let total = cart.reduce((s,i) => s + i.price * i.qty, 0);
        return `<div class="glass-card">
            ${cart.map(i => `
                <div class="stat-row">
                    <span>${escapeHtml(i.name)} x${i.qty}</span>
                    <span>${i.price * i.qty} ₽</span>
                    <button class="del-cart" data-id="${i.id}">❌</button>
                </div>
            `).join('')}
            <div class="stat-row"><strong>Итого</strong><strong>${total} ₽</strong></div>
            <button class="btn-primary" id="orderBtn">💳 Оформить заказ</button>
        </div>`;
    }
    
    function renderFaq() {
        return `
            <div class="glass-card">
                <h3>📌 FAQ — часто задаваемые вопросы</h3><br>
                <p><strong>1️⃣ Как быстро я получу товар?</strong><br>⚡️ Моментально. Сразу после подтверждения оплаты данные от аккаунта (логин:пароль) придут Вам в чат.</p><br>
                <p><strong>2️⃣ Есть ли гарантия на аккаунты?</strong><br>🛡 Да. Мы гарантируем валидность аккаунта на момент покупки.</p><br>
                <p><strong>3️⃣ Что делать, если аккаунт перестал работать через время?</strong><br>🚀 Срок жизни аккаунта зависит от ваших действий.</p><br>
                <p><strong>4️⃣ Как правильно заходить в Telegram аккаунт?</strong><br>💡 Используйте качественные прокси/VPN той страны, на которую реган аккаунт.</p><br>
                <p><strong>5️⃣ Какие способы оплаты доступны?</strong><br>💳 Telegram Stars, @send, TON. Банковские карты в разработке.</p><br>
                <p><strong>6️⃣ Куда писать, если возникла проблема?</strong><br>📞 Пишите тикет админам в разделе "Тех.поддержка" в боте.</p>
            </div>
            <div class="glass-card">
                <button class="btn-primary btn-secondary" id="rulesBtn">📝 Правила и пользовательское соглашение</button>
                <button class="btn-primary btn-secondary" id="supportBtn">📞 Техническая поддержка</button>
            </div>
        `;
    }
    
    function renderChat() {
        return `
            <div class="glass-card">
                <h3>👥 Общий чат</h3>
                <div id="chatMessagesContainer" class="chat-messages"></div>
                <div class="chat-input-area">
                    <input type="text" id="chatInput" class="chat-input" placeholder="Напишите сообщение...">
                    <button id="chatSendBtn" class="chat-send">📤</button>
                </div>
            </div>
        `;
    }
    
    function renderChatMessages() {
        const container = document.getElementById('chatMessagesContainer');
        if (!container) return;
        if (chatMessages.length === 0) {
            container.innerHTML = '<div style="text-align:center; color:#666; padding:20px;">Нет сообщений. Будь первым!</div>';
            return;
        }
        container.innerHTML = chatMessages.map(msg => `
            <div class="chat-message">
                <strong>${escapeHtml(msg.username)}</strong> <span style="font-size:10px; color:#666;">${msg.date}</span><br>
                ${escapeHtml(msg.text)}
            </div>
        `).join('');
        container.scrollTop = container.scrollHeight;
    }
    
    function sendChatMessage() {
        const input = document.getElementById('chatInput');
        const text = input.value.trim();
        if (!text) return;
        const message = {
            id: Date.now(),
            user_id: user.id,
            username: user.username || user.first_name,
            text: text,
            date: new Date().toLocaleTimeString()
        };
        chatMessages.push(message);
        saveToStorage();
        input.value = '';
        renderChatMessages();
    }
    
    function showPromoModal() {
        const modal = document.createElement('div');
        modal.className = 'modal-overlay';
        modal.innerHTML = `
            <div class="modal-content">
                <h3 style="text-align:center;">💎 Активация промокода</h3>
                <input type="text" id="promoInput" class="modal-input" placeholder="Введите промокод" autofocus>
                <div class="modal-buttons">
                    <div class="modal-btn modal-btn-cancel" id="promoCancel">❌ Отмена</div>
                    <div class="modal-btn modal-btn-confirm" id="promoConfirm">✅ Активировать</div>
                </div>
            </div>
        `;
        document.body.appendChild(modal);
        const input = modal.querySelector('#promoInput');
        input.focus();
        modal.querySelector('#promoConfirm').onclick = async () => {
            const code = input.value.trim().toUpperCase();
            if (!code) {
                tg.showPopup({ title: "Ошибка", message: "Введите промокод", buttons: [{ type: "ok" }] });
                return;
            }
            modal.remove();
            const result = await sendRequest('activate_promo', { code: code });
            if (result.success) {
                balance += result.reward;
                promoCount++;
                saveToStorage();
                tg.showPopup({ title: "✅ Успех", message: `Промокод активирован! +${result.reward}₽`, buttons: [{ type: "ok" }] });
                if (currentTab === 'profile') renderCurrentTab();
            } else {
                tg.showPopup({ title: "❌ Ошибка", message: result.error || "Промокод не найден", buttons: [{ type: "ok" }] });
            }
        };
        modal.querySelector('#promoCancel').onclick = () => modal.remove();
        input.addEventListener('keypress', (e) => { if (e.key === 'Enter') modal.querySelector('#promoConfirm').click(); });
    }
    
    async function renderCurrentTab() {
        const container = document.getElementById('content');
        if (currentTab === 'catalog') container.innerHTML = renderCatalog();
        else if (currentTab === 'profile') container.innerHTML = renderProfile();
        else if (currentTab === 'cart') container.innerHTML = renderCart();
        else if (currentTab === 'faq') container.innerHTML = renderFaq();
        else if (currentTab === 'chat') container.innerHTML = renderChat();
        
        if (currentTab === 'cart') {
            document.querySelectorAll('.del-cart').forEach(btn => {
                btn.onclick = () => {
                    cart = cart.filter(i => i.id !== parseInt(btn.dataset.id));
                    renderCurrentTab();
                };
            });
            document.getElementById('orderBtn')?.addEventListener('click', async () => {
                const total = cart.reduce((s,i) => s + i.price * i.qty, 0);
                if (balance >= total) {
                    balance -= total;
                    totalOrders++;
                    activeOrders++;
                    for (let item of cart) {
                        if (item.type === 'link' && item.url) {
                            tg.showPopup({title: "✅ Товар", message: `Ссылка: ${item.url}`, buttons:[{type:"ok"}]});
                        }
                    }
                    cart = [];
                    saveToStorage();
                    renderCurrentTab();
                    tg.showPopup({title: "✅ Успех", message: "Заказ оформлен! Товары выданы.", buttons:[{type:"ok"}]});
                } else {
                    tg.showPopup({title: "❌ Ошибка", message: "Недостаточно средств. Пополните баланс в профиле.", buttons:[{type:"ok"}]});
                }
            });
        }
        
        if (currentTab === 'faq') {
            document.getElementById('supportBtn')?.addEventListener('click', () => window.open('https://t.me/MarketAura_bot?start=support'));
            document.getElementById('rulesBtn')?.addEventListener('click', () => window.open('https://auramarketpravila.tilda.ws/auramarketpravila', '_blank'));
        }
        
        if (currentTab === 'profile') {
            document.getElementById('replenishBtn')?.addEventListener('click', showReplenishModal);
            document.getElementById('activatePromoBtn')?.addEventListener('click', showPromoModal);
        }
        
        if (currentTab === 'chat') {
            renderChatMessages();
            document.getElementById('chatSendBtn')?.addEventListener('click', sendChatMessage);
            document.getElementById('chatInput')?.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') sendChatMessage();
            });
        }
    }
    
    // Загрузка данных
    loadUserData();
    
    document.querySelectorAll('.nav-item').forEach(btn => {
        btn.onclick = () => {
            currentTab = btn.dataset.tab;
            if (currentTab !== 'catalog') {
                catalogView = 'main';
                currentCategory = null;
                currentSubcategory = null;
                currentProduct = null;
            }
            document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            renderCurrentTab();
        };
    });
    
    renderCurrentTab();
</script>
</body>
</html>
