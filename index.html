    // ==================== ФУНКЦИИ ====================
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    
    function addToCart(product) {
        if (product.empty) return;
        const exist = cart.find(i => i.id === product.id);
        if (exist) exist.qty++;
        else cart.push({...product, qty: 1});
        tg.showPopup({title: "Добавлено", message: `${product.name} в корзине`, buttons:[{type:"ok"}]});
        if (currentTab === 'cart') renderCurrentTab();
    }
    
    function loadFromStorage() {
        const savedChat = localStorage.getItem('auramarket_chat');
        if (savedChat) chatMessages = JSON.parse(savedChat);
        const savedBalance = localStorage.getItem('auramarket_balance');
        if (savedBalance) balance = parseInt(savedBalance);
        const savedOrders = localStorage.getItem('auramarket_orders');
        if (savedOrders) totalOrders = parseInt(savedOrders);
        const savedPromoCount = localStorage.getItem('auramarket_promo_count');
        if (savedPromoCount) promoCount = parseInt(savedPromoCount);
    }
    
    function saveToStorage() {
        localStorage.setItem('auramarket_chat', JSON.stringify(chatMessages));
        localStorage.setItem('auramarket_balance', balance);
        localStorage.setItem('auramarket_orders', totalOrders);
        localStorage.setItem('auramarket_promo_count', promoCount);
    }
    
    async function sendRequest(action, data = {}) {
        data.action = action;
        try {
            const response = await tg.sendData(JSON.stringify(data));
            return JSON.parse(response);
        } catch(e) {
            return {};
        }
    }
    
    function showPromoModal() {
        const modal = document.createElement('div');
        modal.className = 'modal-overlay';
        modal.innerHTML = `
            <div class="modal-content">
                <h3 style="text-align:center;">💎 Активация промокода</h3>
                <input type="text" id="promoInput" class="modal-input" placeholder="Введите промокод" autofocus>
                <div class="modal-buttons">
                    <div class="modal-btn modal-btn-cancel" id="promoCancel">❌ Отмена</div>
                    <div class="modal-btn modal-btn-confirm" id="promoConfirm">✅ Активировать</div>
                </div>
            </div>
        `;
        document.body.appendChild(modal);
        const input = modal.querySelector('#promoInput');
        input.focus();
        modal.querySelector('#promoConfirm').onclick = async () => {
            const code = input.value.trim().toUpperCase();
            if (!code) {
                tg.showPopup({ title: "Ошибка", message: "Введите промокод", buttons: [{ type: "ok" }] });
                return;
            }
            modal.remove();
            const result = await sendRequest('activate_promo', { code: code });
            if (result.success) {
                balance += result.reward;
                promoCount++;
                saveToStorage();
                tg.showPopup({ title: "✅ Успех", message: `Промокод активирован! +${result.reward}₽`, buttons: [{ type: "ok" }] });
                if (currentTab === 'profile') renderCurrentTab();
            } else {
                tg.showPopup({ title: "❌ Ошибка", message: result.error || "Промокод не найден", buttons: [{ type: "ok" }] });
            }
        };
        modal.querySelector('#promoCancel').onclick = () => modal.remove();
        input.addEventListener('keypress', (e) => { if (e.key === 'Enter') modal.querySelector('#promoConfirm').click(); });
    }
    
    // ==================== ОТРИСОВКА ====================
    function renderMainCatalog() {
        let html = '<div class="products-grid">';
        for (let catName of categoryList) {
            const cat = categories[catName];
            html += `
                <div class="product-card" onclick="openCategory('${catName}')">
                    <div style="font-size: 40px;">${cat.icon}</div>
                    <div style="font-size: 18px; font-weight: bold; margin-top: 8px;">${catName}</div>
                </div>
            `;
        }
        html += '</div>';
        return html;
    }
    
    window.openCategory = function(catName) {
        catalogView = 'category';
        currentCategory = catName;
        renderCurrentTab();
    };
    
    window.openSubcategory = function(subName) {
        catalogView = 'subcategory';
        currentSubcategory = subName;
        renderCurrentTab();
    };
    
    window.openProduct = function(productId, catName, subName) {
        let product = null;
        if (subName) {
            product = categories[catName].products[subName].find(p => p.id === productId);
        } else {
            product = categories[catName].products.find(p => p.id === productId);
        }
        if (product) {
            currentProduct = product;
            catalogView = 'product';
            renderCurrentTab();
        }
    };
    
    window.goBack = function() {
        if (catalogView === 'product') {
            if (currentSubcategory) {
                catalogView = 'subcategory';
            } else {
                catalogView = 'category';
            }
            currentProduct = null;
            renderCurrentTab();
        } else if (catalogView === 'subcategory') {
            catalogView = 'category';
            currentSubcategory = null;
            renderCurrentTab();
        } else if (catalogView === 'category') {
            catalogView = 'main';
            currentCategory = null;
            renderCurrentTab();
        }
    };
    
    function renderCategoryView() {
        const cat = categories[currentCategory];
        if (!cat) return '<div class="empty-stock">Категория не найдена</div>';
        
        if (cat.subcategories) {
            // Есть подкатегории
            let html = `<button class="back-btn" onclick="goBack()">← Назад</button>`;
            html += `<div class="category-header"><span class="category-icon">${cat.icon}</span><span class="category-title">${currentCategory}</span></div>`;
            html += `<div class="subcategory-grid">`;
            for (let sub of cat.subcategories) {
                html += `<div class="subcategory-btn" onclick="openSubcategory('${sub}')">${sub}</div>`;
            }
            html += `</div>`;
            return html;
        } else {
            // Нет подкатегорий, сразу товары
            let productsList = cat.products;
            let html = `<button class="back-btn" onclick="goBack()">← Назад</button>`;
            html += `<div class="category-header"><span class="category-icon">${cat.icon}</span><span class="category-title">${currentCategory}</span></div>`;
            html += `<div class="products-grid">`;
            for (let p of productsList) {
                if (p.empty) {
                    html += `<div class="product-card" style="opacity:0.7;"><div>📦</div><strong>${p.name}</strong><div class="price">${p.price === 0 ? 'Нет в наличии' : p.price + ' ₽'}</div></div>`;
                } else {
                    html += `<div class="product-card" onclick="openProduct('${p.id}', '${currentCategory}', null)"><div>🎮</div><strong>${p.name}</strong><div class="price">${p.price} ₽</div></div>`;
                }
            }
            html += `</div>`;
            return html;
        }
    }
    
    function renderSubcategoryView() {
        const cat = categories[currentCategory];
        const productsList = cat.products[currentSubcategory];
        if (!productsList) return '<div class="empty-stock">Нет товаров</div>';
        
        let html = `<button class="back-btn" onclick="goBack()">← Назад</button>`;
        html += `<div class="category-header"><span class="category-icon">${cat.icon}</span><span class="category-title">${currentCategory} / ${currentSubcategory}</span></div>`;
        html += `<div class="products-grid">`;
        for (let p of productsList) {
            if (p.empty) {
                html += `<div class="product-card" style="opacity:0.7;"><div>📦</div><strong>${p.name}</strong><div class="price">${p.price === 0 ? 'Нет в наличии' : p.price + ' ₽'}</div></div>`;
            } else {
                html += `<div class="product-card" onclick="openProduct('${p.id}', '${currentCategory}', '${currentSubcategory}')"><div>🎮</div><strong>${p.name}</strong><div class="price">${p.price} ₽</div></div>`;
            }
        }
        html += `</div>`;
        return html;
    }
    
    function renderProductView() {
        let html = `<button class="back-btn" onclick="goBack()">← Назад</button>`;
        html += `<div class="product-detail">`;
        html += `<h2>${escapeHtml(currentProduct.name)}</h2>`;
        html += `<div class="price">${currentProduct.price} ₽</div>`;
        html += `<div class="description">${escapeHtml(currentProduct.description).replace(/\n/g, '<br>')}</div>`;
        html += `<button class="btn-primary" onclick="addToCartFromDetail()">🛒 Добавить в корзину</button>`;
        html += `</div>`;
        return html;
    }
    
    window.addToCartFromDetail = function() {
        addToCart(currentProduct);
    };
    
    function renderCatalog() {
        if (catalogView === 'main') return renderMainCatalog();
        else if (catalogView === 'category') return renderCategoryView();
        else if (catalogView === 'subcategory') return renderSubcategoryView();
        else if (catalogView === 'product') return renderProductView();
        return '<div class="empty-stock">Ошибка</div>';
    }
    
    function renderProfile() {
        return `
            <div class="glass-card" style="text-align:center;">
                <div style="font-size:56px;">👤</div>
                <h2>${escapeHtml(user.first_name)}</h2>
                <div style="color:#aaa; margin-bottom:15px;">@${user.username || 'user'}</div>

                <button class="btn-primary" id="activatePromoBtn">💎 Активировать промокод</button>
            </div>

        return `<div class="glass-card">

                    <span>${escapeHtml(i.name)} x${i.qty}</span>
                    <span>${i.price * i.qty} ₽</span>
                    <button class="del-cart" data-id="${i.id}">❌</button>
                </div>
            `).join('')}
            <div class="stat-row"><strong>Итого</strong><strong>${total} ₽</strong></div>
            <button class="btn-primary" id="orderBtn">💳 Оформить заказ</button>
        </div>`;
    }
    
    function renderFaq() {
        return `
            <div class="glass-card">
                <h3>📌 FAQ — часто задаваемые вопросы</h3><br>
                <p><strong>1️⃣ Как быстро я получу товар?</strong><br>⚡️ Моментально. Сразу после подтверждения оплаты данные от аккаунта (логин:пароль) придут Вам в чат.</p><br>
                <p><strong>2️⃣ Есть ли гарантия на аккаунты?</strong><br>🛡 Да. Мы гарантируем валидность аккаунта на момент покупки. Если аккаунт не работает сразу — мы сделаем замену. Важно: записывайте видео с момента покупки.</p><br>
                <p><strong>3️⃣ Что делать, если аккаунт перестал работать через время?</strong><br>🚀 Срок жизни аккаунта зависит от ваших действий. Мы не несём ответственности за блокировки после входа.</p><br>
                <p><strong>4️⃣ Как правильно заходить в Telegram аккаунт?</strong><br>💡 Используйте качественные прокси/VPN той страны, на которую реган аккаунт. Заходите через инкогнито. Не меняйте все данные в первую минуту.</p><br>
                <p><strong>5️⃣ Какие способы оплаты доступны?</strong><br>💳 Мы принимаем оплату на РФ карты, @send, tonkeeper, telegram stars.</p><br>
                <p><strong>6️⃣ Куда писать, если возникла проблема?</strong><br>📞 Пишите тикет админам в разделе "Тех.поддержка" в боте.</p>
            </div>
            <div class="glass-card">
                <button class="btn-primary btn-secondary" id="rulesBtn">📝 Правила и пользовательское соглашение</button>
                <button class="btn-primary btn-secondary" id="supportBtn">📞 Техническая поддержка</button>
            </div>
        `;
    }
    
    function renderChat() {
        return `
            <div class="glass-card">
                <h3>👥 Общий чат</h3>
                <div id="chatMessagesContainer" class="chat-messages"></div>
                <div class="chat-input-area">
                    <input type="text" id="chatInput" class="chat-input" placeholder="Напишите сообщение...">
                    <button id="chatSendBtn" class="chat-send">📤</button>
                </div>
            </div>
        `;
    }
    
    function renderChatMessages() {
        const container = document.getElementById('chatMessagesContainer');
        if (!container) return;
        if (chatMessages.length === 0) {
            container.innerHTML = '<div style="text-align:center; color:#666; padding:20px;">Нет сообщений. Будь первым!</div>';
            return;
        }
        container.innerHTML = chatMessages.map(msg => `
            <div class="chat-message">
                <strong>${escapeHtml(msg.username)}</strong> <span style="font-size:10px; color:#666;">${msg.date}</span><br>
                ${escapeHtml(msg.text)}
            </div>
        `).join('');
        container.scrollTop = container.scrollHeight;
    }
    
    function sendChatMessage() {
        const input = document.getElementById('chatInput');
        const text = input.value.trim();
        if (!text) return;
        const message = {
            id: Date.now(),
            user_id: user.id,
            username: user.username || user.first_name,
            text: text,
            date: new Date().toLocaleTimeString()
        };
        chatMessages.push(message);
        saveToStorage();
        input.value = '';
        renderChatMessages();
    }
    
    function renderCurrentTab() {
        const container = document.getElementById('content');
        if (currentTab === 'catalog') container.innerHTML = renderCatalog();
        else if (currentTab === 'profile') container.innerHTML = renderProfile();
        else if (currentTab === 'cart') container.innerHTML = renderCart();
        else if (currentTab === 'faq') container.innerHTML = renderFaq();
        else if (currentTab === 'chat') container.innerHTML = renderChat();
        
        if (currentTab === 'cart') {
            document.querySelectorAll('.del-cart').forEach(btn => {
                btn.onclick = () => {
                    cart = cart.filter(i => i.id !== parseInt(btn.dataset.id));
                    renderCurrentTab();
                };
            });
            document.getElementById('orderBtn')?.addEventListener('click', async () => {
                const total = cart.reduce((s,i) => s + i.price * i.qty, 0);
                if (balance >= total) {
                    balance -= total;
                    totalOrders++;
                    activeOrders++;
                    cart = [];
                    saveToStorage();
                    renderCurrentTab();
                    tg.showPopup({title: "✅ Успех", message: "Заказ оформлен! Товары выданы в боте.", buttons:[{type:"ok"}]});
                } else {
                    tg.showPopup({title: "❌ Ошибка", message: "Недостаточно средств", buttons:[{type:"ok"}]});
                }
            });
        }
        
        if (currentTab === 'faq') {
            document.getElementById('supportBtn')?.addEventListener('click', () => window.open('https://t.me/MarketAura_bot?start=support'));
            document.getElementById('rulesBtn')?.addEventListener('click', () => window.open('https://auramarketpravila.tilda.ws/auramarketpravila', '_blank'));
        }
        
        if (currentTab === 'profile') {
            document.getElementById('activatePromoBtn')?.addEventListener('click', showPromoModal);
        }
        
        if (currentTab === 'chat') {
            renderChatMessages();
            document.getElementById('chatSendBtn')?.addEventListener('click', sendChatMessage);
            document.getElementById('chatInput')?.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') sendChatMessage();
            });
        }
    }
    
    // Инициализация
    loadFromStorage();
    
    document.querySelectorAll('.nav-item').forEach(btn => {
        btn.onclick = () => {
            currentTab = btn.dataset.tab;
            // Сбрасываем навигацию каталога при переключении на другую вкладку
            if (currentTab !== 'catalog') {
                catalogView = 'main';
                currentCategory = null;
                currentSubcategory = null;
                currentProduct = null;
            }
            document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            renderCurrentTab();
        };
    });
    
    renderCurrentTab();
</script>
</body>
</html>
