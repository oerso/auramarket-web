<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>AuraMarket | Mini App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }
        body {
            background: radial-gradient(circle at 10% 20%, #0a0a0f, #05050a);
            font-family: 'Montserrat', 'Segoe UI', system-ui, sans-serif;
            color: white;
            min-height: 100vh;
            padding-bottom: 80px;
        }
        /* логотип скрещённый A+М */
        .logo-merged {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 4px;
            margin-bottom: 8px;
        }
        .letter {
            font-size: 42px;
            font-weight: 900;
            background: linear-gradient(135deg, #fff, #b300ff, #6a00ff);
            background-size: 200% auto;
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 12px rgba(179,0,255,0.6);
            transform: rotate(-2deg);
        }
        .letter.m {
            transform: rotate(4deg) translateX(-5px);
        }
        /* карточки */
        .glass-card {
            background: rgba(20,20,40,0.5);
            backdrop-filter: blur(12px);
            border-radius: 32px;
            padding: 24px;
            margin: 16px;
            border: 1px solid rgba(179,0,255,0.3);
            transition: 0.2s;
        }
        .stat-row {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid rgba(179,0,255,0.2);
        }
        .btn-primary {
            background: linear-gradient(90deg, #b300ff, #6a00ff);
            border: none;
            width: 100%;
            padding: 14px;
            border-radius: 48px;
            font-weight: bold;
            color: white;
            font-size: 16px;
            margin-top: 12px;
            cursor: pointer;
            transition: 0.2s;
        }
        .btn-primary:active { transform: scale(0.97); }
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(8,8,16,0.95);
            backdrop-filter: blur(20px);
            display: flex;
            justify-content: space-around;
            padding: 8px 16px 20px;
            border-top: 1px solid #b300ff;
        }
        .nav-item {
            background: transparent;
            border: none;
            color: #aaa;
            font-size: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            cursor: pointer;
        }
        .nav-item.active {
            color: #b300ff;
            text-shadow: 0 0 6px #b300ff;
        }
        .hidden { display: none; }
        .dev-message { text-align: center; padding: 40px 20px; }
    </style>
</head>
<body>

<div class="glass-card" style="text-align: center;">
    <div class="logo-merged">
        <div class="letter">A</div>
        <div class="letter m">M</div>
    </div>
    <div style="font-size: 22px; font-weight: bold;">AuraMarket</div>
    <div style="font-size: 12px; color: #b300ff;">⚡ премиум цифровой магазин</div>
</div>

<div id="content"></div>

<div class="bottom-nav">
    <button class="nav-item" data-tab="catalog"><span>🛍️</span><span>Каталог</span></button>
    <button class="nav-item" data-tab="profile"><span>👤</span><span>Профиль</span></button>
    <button class="nav-item" data-tab="balance"><span>💵</span><span>Баланс</span></button>
    <button class="nav-item" data-tab="cart"><span>🛒</span><span>Корзина</span></button>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();
    tg.MainButton.hide();
    const user = tg.initDataUnsafe?.user || { id: 0, username: 'user', first_name: 'Гость' };

    let balance = 0;
    let totalOrders = 0, activeOrders = 0, pendingOrders = 0;

    async function fetchUserData() {
        // здесь позже можно реально запросить через бота, но пока оставим демо-данные
        balance = 1275;
        totalOrders = 12;
        activeOrders = 4;
        pendingOrders = 2;
        renderCurrentTab();
    }

    const sections = {
        catalog: () => `<div class="dev-message"><h3>🛍️ Каталог</h3><p>❌ Каталог находится на технических работах и в ближайшее время будет доступен.</p><p>✨ Следите за новостями!</p></div>`,
        profile: () => `<div class="glass-card">
            <div style="text-align:center"><span style="font-size:48px;">👤</span><h3>${user.first_name}</h3><div>@{username}</div></div>
            <div class="stat-row"><span>💰 Баланс</span><span>${balance} ₽</span></div>
            <button class="btn-primary" id="supportBtn">📞 Техподдержка</button>
            <button class="btn-primary" id="rulesBtn">📝 Правила</button>
        </div>`,
        balance: () => `<div class="glass-card">
            <div class="stat-row"><span>💰 Баланс</span><span>${balance} ₽</span></div>
            <div class="stat-row"><span>|— Заказов</span><span>${totalOrders}</span></div>
            <div class="stat-row"><span>|— Активных заказов</span><span>${activeOrders}</span></div>
            <div class="stat-row"><span>|— Заказов на обработке</span><span>${pendingOrders}</span></div>
            <button class="btn-primary" id="replenishBtn">💸 Пополнить баланс</button>
        </div>`,
        cart: () => `<div class="dev-message"><h3>🛒 Корзина</h3><p>❌ У вас пока нет товаров в корзине</p><p>Выберите товары в каталоге и они появятся здесь.</p></div>`
    };

    let currentTab = 'catalog';

    function renderCurrentTab() {
        const container = document.getElementById('content');
        if(sections[currentTab]) container.innerHTML = sections[currentTab]();
        else container.innerHTML = '<div class="dev-message">Ошибка</div>';
        attachButtons();
    }

    function attachButtons() {
        document.getElementById('supportBtn')?.addEventListener('click', () => {
            window.location.href = 'https://t.me/MarketAura_bot?start=support';
        });
        document.getElementById('rulesBtn')?.addEventListener('click', () => {
            window.open('https://clearly-first-adamite.tilda.ws/auramarketpravila', '_blank');
        });
        document.getElementById('replenishBtn')?.addEventListener('click', () => {
            tg.showPopup({ title: 'Пополнение', message: '🔨 Способ пополнения временно недоступен. Скоро добавим!', buttons: [{type:'ok'}] });
        });
    }

    document.querySelectorAll('.nav-item').forEach(btn => {
        btn.addEventListener('click', (e) => {
            currentTab = btn.dataset.tab;
            document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            renderCurrentTab();
        });
    });
    fetchUserData();
</script>
</body>
</html>
