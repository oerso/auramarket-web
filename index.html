<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>AuraMarket | Магазин</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: radial-gradient(circle at 20% 30%, #0a0a0f, #030308);
            font-family: 'Montserrat', system-ui;
            color: white;
            min-height: 100vh;
            padding-bottom: 80px;
        }
        .glass-card {
            background: rgba(20,20,40,0.65);
            backdrop-filter: blur(16px);
            border-radius: 32px;
            padding: 20px;
            margin: 16px;
            border: 1px solid rgba(179,0,255,0.35);
        }
        .btn-primary {
            background: linear-gradient(90deg, #b300ff, #6a00ff);
            border: none;
            width: 100%;
            padding: 14px;
            border-radius: 60px;
            font-weight: bold;
            color: white;
            cursor: pointer;
            margin: 5px 0;
        }
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 16px;
            padding: 10px;
        }
        .product-card {
            background: rgba(25,25,50,0.7);
            border-radius: 28px;
            padding: 16px;
            border: 1px solid rgba(179,0,255,0.25);
        }
        .stat-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid rgba(179,0,255,0.2); }
        .bottom-nav {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: rgba(8,8,16,0.96); backdrop-filter: blur(20px);
            display: flex; justify-content: space-around; padding: 8px 16px 22px;
            border-top: 1px solid #b300ff;
        }
        .nav-item {
            background: transparent; border: none; color: #aaa; font-size: 12px;
            display: flex; flex-direction: column; align-items: center; gap: 4px;
            cursor: pointer; padding: 6px 12px; border-radius: 40px;
        }
        .nav-item.active { color: #b300ff; background: rgba(179,0,255,0.15); }
        .logo-3d {
            width: 70px; height: 70px;
            background: linear-gradient(135deg, #1e0b32, #0a0a0f);
            border-radius: 28px; margin: 0 auto 10px;
            display: flex; align-items: center; justify-content: center; gap: 5px;
        }
        .logo-letter { font-size: 42px; font-weight: 900; background: linear-gradient(145deg, #fff, #b300ff); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .category-chip {
            background: rgba(179,0,255,0.2); border-radius: 30px; padding: 6px 16px;
            font-size: 14px; cursor: pointer; display: inline-block; margin: 5px;
        }
        .category-chip.active { background: #b300ff; color: white; }
        .categories { text-align: center; margin: 10px 0; }
    </style>
</head>
<body>

<div class="glass-card" style="text-align:center">
    <div class="logo-3d"><span class="logo-letter">A</span><span class="logo-letter">M</span></div>
    <div style="font-size:26px; font-weight:800;">AuraMarket</div>
    <div style="font-size:12px; color:#b300ff;">Премиум магазин</div>
</div>

<div id="content"></div>
<div class="bottom-nav">
    <button class="nav-item" data-tab="catalog"><span>🛍️</span><span>Каталог</span></button>
    <button class="nav-item" data-tab="profile"><span>👤</span><span>Профиль</span></button>
    <button class="nav-item" data-tab="balance"><span>💵</span><span>Баланс</span></button>
    <button class="nav-item" data-tab="cart"><span>🛒</span><span>Корзина</span></button>
    <button class="nav-item" data-tab="faq"><span>❓</span><span>FAQ</span></button>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();
    const user = tg.initDataUnsafe?.user || { id: 0, username: 'user', first_name: 'Гость' };
    
    let balance = 0, totalOrders = 0, pendingOrders = 0;
    let cart = [];
    let allProducts = [];
    let currentCategory = 'all';
    let categories = new Set();
    let currentTab = 'catalog';
    
    async function sendRequest(action, data = {}) {
        data.action = action;
        const response = await tg.sendData(JSON.stringify(data));
        try { return JSON.parse(response); } catch(e) { return {}; }
    }
    
    async function loadData() {
        let data = await sendRequest('get_data');
        balance = data.balance || 0;
        totalOrders = data.total_orders || 0;
        pendingOrders = data.pending_orders || 0;
        let prodData = await sendRequest('get_products');
        allProducts = prodData.products || [];
        categories.clear();
        categories.add('all');
        allProducts.forEach(p => categories.add(p.category));
        renderCurrentTab();
    }
    
    function escapeHtml(str) { if(!str) return ''; return str.replace(/[&<>]/g, function(m){ if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }
    
    function renderCatalog() {
        let filtered = currentCategory === 'all' ? allProducts : allProducts.filter(p => p.category === currentCategory);
        let chips = Array.from(categories).map(cat => `<span class="category-chip ${cat === currentCategory ? 'active' : ''}" data-cat="${cat}">${cat === 'all' ? 'Все' : cat}</span>`).join('');
        let productsHtml = filtered.map(p => `<div class="product-card"><h3>${escapeHtml(p.name)}</h3><div class="stat-row"><span>💰 Цена</span><span>${p.price} ₽</span></div><button class="add-to-cart" data-id="${p.id}" data-name="${escapeHtml(p.name)}" data-price="${p.price}">В корзину</button></div>`).join('');
        return `<div class="categories">${chips}</div><div class="products-grid">${productsHtml}</div>`;
    }
    
    function renderProfile() {
        return `<div class="glass-card" style="text-align:center"><span style="font-size:64px;">👑</span><h2>${escapeHtml(user.first_name)}</h2><div class="stat-row"><span>💰 Баланс</span><span>${balance} ₽</span></div><div class="stat-row"><span>📦 Заказов</span><span>${totalOrders}</span></div><button class="btn-primary" id="supportBtn">📞 Техподдержка</button><button class="btn-primary" id="rulesBtn">📝 Правила</button></div>`;
    }
    
    function renderBalance() {
        return `<div class="glass-card"><div class="stat-row"><span>💰 Баланс</span><span>${balance} ₽</span></div><div class="stat-row"><span>📦 Заказов</span><span>${totalOrders}</span></div><div class="stat-row"><span>⚙️ В процессе</span><span>${pendingOrders}</span></div><button class="btn-primary" id="replenishBtn">💸 Пополнить баланс</button></div>`;
    }
    
    function renderCart() {
        if(cart.length === 0) return `<div class="glass-card" style="text-align:center">🛒 Корзина пуста</div>`;
        let total = cart.reduce((s,i) => s + i.price * i.qty, 0);
        return `<div class="glass-card">${cart.map(i => `<div class="stat-row"><span>${escapeHtml(i.name)} x${i.qty}</span><span>${i.price * i.qty} ₽</span><button class="del-cart" data-id="${i.id}">❌</button></div>`).join('')}<div class="stat-row"><strong>Итого</strong><strong>${total} ₽</strong></div><button class="btn-primary" id="orderBtn">Оформить заказ</button></div>`;
    }
    
    function renderFaq() {
        return `<div class="glass-card"><h3>🔍 Частые вопросы</h3><p>⚡ Мгновенная выдача</p><p>🛡 Гарантия 30 дней</p><p>💳 Оплата: карты, крипта, Stars</p><p>📞 Поддержка в тикетах</p></div>`;
    }
    
    function renderCurrentTab() {
        const container = document.getElementById('content');
        if (currentTab === 'catalog') container.innerHTML = renderCatalog();
        else if (currentTab === 'profile') container.innerHTML = renderProfile();
        else if (currentTab === 'balance') container.innerHTML = renderBalance();
        else if (currentTab === 'cart') container.innerHTML = renderCart();
        else if (currentTab === 'faq') container.innerHTML = renderFaq();
        
        if (currentTab === 'catalog') {
            document.querySelectorAll('.add-to-cart').forEach(btn => {
                btn.onclick = () => {
                    let id = parseInt(btn.dataset.id);
                    let name = btn.dataset.name;
                    let price = parseInt(btn.dataset.price);
                    let exist = cart.find(i => i.id === id);
                    if (exist) exist.qty++;
                    else cart.push({id, name, price, qty: 1});
                    tg.showPopup({title: "Добавлено", message: `${name} в корзине`, buttons:[{type:"ok"}]});
                };
            });
            document.querySelectorAll('.category-chip').forEach(chip => chip.onclick = () => { currentCategory = chip.dataset.cat; renderCurrentTab(); });
        }
        if (currentTab === 'cart') {
            document.querySelectorAll('.del-cart').forEach(btn => btn.onclick = () => { cart = cart.filter(i => i.id !== parseInt(btn.dataset.id)); renderCurrentTab(); });
            document.getElementById('orderBtn')?.addEventListener('click', async () => {
                let total = cart.reduce((s,i) => s + i.price * i.qty, 0);
                if (balance >= total) {
                    let result = await sendRequest('order', {items: cart, total});
                    if (result.success) {
                        balance = result.new_balance;
                        totalOrders++;
                        cart = [];
                        renderCurrentTab();
                        tg.showPopup({title: "✅ Успех", message: "Заказ оформлен!", buttons:[{type:"ok"}]});
                    } else tg.showPopup({title: "Ошибка", message: result.error, buttons:[{type:"ok"}]});
                } else tg.showPopup({title: "Ошибка", message: "Недостаточно средств", buttons:[{type:"ok"}]});
            });
        }
        document.getElementById('supportBtn')?.addEventListener('click', () => window.open('https://t.me/MarketAura_bot?start=support'));
        document.getElementById('rulesBtn')?.addEventListener('click', () => window.open('https://clearly-first-adamite.tilda.ws/auramarketpravila', '_blank'));
        document.getElementById('replenishBtn')?.addEventListener('click', () => tg.showPopup({title: "Пополнение", message: "Скоро появится", buttons:[{type:"ok"}]}));
    }
    
    document.querySelectorAll('.nav-item').forEach(btn => {
        btn.onclick = () => {
            currentTab = btn.dataset.tab;
            document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            renderCurrentTab();
        };
    });
    
    loadData();
</script>
</body>
</html>
