<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тест Mini App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background: #0a0a0f; color: white; font-family: system-ui; padding: 20px; }
        button { background: #b300ff; border: none; padding: 15px; margin: 10px; border-radius: 16px; color: white; font-size: 16px; cursor: pointer; }
        input, textarea { width: 100%; padding: 10px; margin: 10px 0; background: #1a1a2e; border: 1px solid #b300ff; border-radius: 12px; color: white; }
    </style>
</head>
<body>
    <h2>Тест добавления товара</h2>
    
    <input type="text" id="name" placeholder="Название">
    <input type="number" id="price" placeholder="Цена">
    <input type="text" id="category" placeholder="Категория">
    <textarea id="desc" placeholder="Описание"></textarea>
    
    <button id="sendBtn">Отправить товар</button>
    <div id="result"></div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        
        document.getElementById('sendBtn').onclick = async () => {
            const data = {
                action: 'add_product',
                name: document.getElementById('name').value,
                price: parseInt(document.getElementById('price').value),
                category: document.getElementById('category').value,
                description: document.getElementById('desc').value,
                photo_url: ''
            };
            
            console.log("Отправляем:", data);
            document.getElementById('result').innerHTML = "Отправляю...";
            
            try {
                const response = await tg.sendData(JSON.stringify(data));
                console.log("Ответ:", response);
                document.getElementById('result').innerHTML = "Ответ: " + response;
            } catch(e) {
                console.error("Ошибка:", e);
                document.getElementById('result').innerHTML = "Ошибка: " + e.message;
            }
        };
    </script>
</body>
</html>
