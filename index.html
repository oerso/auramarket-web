<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>AuraMarket | Каталог</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: radial-gradient(circle at 20% 30%, #0a0a0f, #030308);
            font-family: 'Montserrat', system-ui;
            color: white;
            padding: 20px;
            padding-bottom: 80px;
        }
        .card {
            background: rgba(20,20,40,0.65);
            backdrop-filter: blur(16px);
            border-radius: 28px;
            padding: 20px;
            margin: 12px 0;
            border: 1px solid rgba(179,0,255,0.35);
        }
        .btn-primary {
            background: linear-gradient(90deg, #b300ff, #6a00ff);
            border: none;
            width: 100%;
            padding: 14px;
            border-radius: 60px;
            font-weight: bold;
            color: white;
            cursor: pointer;
            margin-top: 10px;
        }
        .price {
            color: #b300ff;
            font-size: 20px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div style="text-align:center; margin-bottom:20px;">
        <div style="font-size:28px; font-weight:800;">AuraMarket</div>
        <div style="font-size:12px; color:#b300ff;">Каталог товаров</div>
    </div>
    
    <div id="productsList" style="text-align:center;">Загрузка товаров...</div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        
        async function sendRequest(action, data = {}) {
            data.action = action;
            console.log("📤 Отправка:", data);
            const response = await tg.sendData(JSON.stringify(data));
            console.log("📥 Ответ:", response);
            try {
                return JSON.parse(response);
            } catch(e) {
                console.error("Ошибка парсинга:", e);
                return {};
            }
        }
        
        async function loadProducts() {
            document.getElementById('productsList').innerHTML = '⏳ Загрузка...';
            const result = await sendRequest('get_products');
            console.log("Результат get_products:", result);
            
            if (result.products && result.products.length > 0) {
                document.getElementById('productsList').innerHTML = result.products.map(p => `
                    <div class="card">
                        <h3>${p.name}</h3>
                        <div class="price">💰 ${p.price} ₽</div>
                        <div>📁 Категория: ${p.category}</div>
                        <button class="btn-primary" onclick="alert('Демо: товар ${p.name} добавлен в корзину')">🛒 В корзину</button>
                    </div>
                `).join('');
            } else {
                document.getElementById('productsList').innerHTML = `
                    <div class="card">
                        ❌ Нет товаров в базе.<br><br>
                        Проверь:<br>
                        1. В админке бота добавь товар<br>
                        2. Перезапусти Mini App
                    </div>
                `;
            }
        }
        
        loadProducts();
    </script>
</body>
</html>
